<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050810">
    <title>Radyo</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #050810;
            --surface: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.07);
            --accent: #3d7fff;
            --accent2: #7c3dff;
            --red: #ff3d5a;
            --text: #f0f4ff;
            --muted: #3d4a60;
        }
        html, body { height: 100%; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
            overflow: hidden; position: fixed;
            width: 100%; top: 0; left: 0;
        }
        .bg-blur {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 60% 50% at 30% 80%, rgba(61,127,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 75% 20%, rgba(124,61,255,0.07) 0%, transparent 60%);
            pointer-events: none;
        }
        .topbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(5,8,16,0.9);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        @supports (padding-top: env(safe-area-inset-top)) {
            .topbar { padding-top: calc(16px + env(safe-area-inset-top)); }
            .bottombar { padding-bottom: calc(14px + env(safe-area-inset-bottom)); }
            .main { padding-top: calc(90px + env(safe-area-inset-top)); padding-bottom: calc(70px + env(safe-area-inset-bottom)); }
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 32px; height: 32px; border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .logo-icon svg { width: 16px; height: 16px; fill: white; display: block; }
        .logo-text { font-size: 15px; font-weight: 700; letter-spacing: 0.5px; color: var(--text); white-space: nowrap; }
        .logo-text span { color: var(--accent); }
        .status-pill {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            padding: 6px 14px; border-radius: 99px;
            font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
            text-transform: uppercase; color: var(--muted);
            transition: all 0.4s; white-space: nowrap;
        }
        .status-pill.live { border-color: rgba(255,61,90,0.25); color: var(--red); background: rgba(255,61,90,0.07); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
        .status-pill.live .status-dot { animation: blink 1.4s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
        .main {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; z-index: 1;
            padding: 90px 24px 70px;
            text-align: center; min-height: 0; overflow: hidden;
        }
        .visualizer {
            display: flex; align-items: flex-end; justify-content: center;
            gap: 4px; height: 44px; margin-bottom: 24px; flex-shrink: 0;
        }
        .bar {
            width: 3px; border-radius: 2px;
            background: linear-gradient(180deg, var(--accent), var(--accent2));
            height: 3px; opacity: 0.35; transition: opacity 0.3s;
        }
        .visualizer.playing .bar { opacity: 1; }
        .visualizer.playing .bar:nth-child(1){animation:wave 0.85s ease-in-out infinite 0.00s}
        .visualizer.playing .bar:nth-child(2){animation:wave 0.85s ease-in-out infinite 0.07s}
        .visualizer.playing .bar:nth-child(3){animation:wave 0.85s ease-in-out infinite 0.14s}
        .visualizer.playing .bar:nth-child(4){animation:wave 0.85s ease-in-out infinite 0.21s}
        .visualizer.playing .bar:nth-child(5){animation:wave 0.85s ease-in-out infinite 0.28s}
        .visualizer.playing .bar:nth-child(6){animation:wave 0.85s ease-in-out infinite 0.35s}
        .visualizer.playing .bar:nth-child(7){animation:wave 0.85s ease-in-out infinite 0.28s}
        .visualizer.playing .bar:nth-child(8){animation:wave 0.85s ease-in-out infinite 0.21s}
        .visualizer.playing .bar:nth-child(9){animation:wave 0.85s ease-in-out infinite 0.14s}
        .visualizer.playing .bar:nth-child(10){animation:wave 0.85s ease-in-out infinite 0.07s}
        .visualizer.playing .bar:nth-child(11){animation:wave 0.85s ease-in-out infinite 0.00s}
        .visualizer.playing .bar:nth-child(12){animation:wave 0.85s ease-in-out infinite 0.07s}
        .visualizer.playing .bar:nth-child(13){animation:wave 0.85s ease-in-out infinite 0.14s}
        .visualizer.playing .bar:nth-child(14){animation:wave 0.85s ease-in-out infinite 0.21s}
        .visualizer.playing .bar:nth-child(15){animation:wave 0.85s ease-in-out infinite 0.28s}
        @keyframes wave { 0%,100%{height:3px} 50%{height:38px} }
        .song-hint {
            font-size: 11px; font-weight: 600; letter-spacing: 2px;
            text-transform: uppercase; color: var(--accent);
            margin-bottom: 14px;
            display: flex; align-items: center; gap: 8px; justify-content: center;
            flex-shrink: 0; min-height: 18px;
        }
        .song-hint svg { width: 10px; height: 10px; flex-shrink: 0; }
        .song-title {
            font-size: clamp(22px, 5vw, 58px);
            font-weight: 700; line-height: 1.15; color: var(--text);
            margin-bottom: 12px; max-width: min(700px, 90vw);
            transition: opacity 0.25s; word-break: break-word;
            overflow-wrap: anywhere; flex-shrink: 0;
        }
        .station-label {
            font-size: 12px; font-weight: 500; letter-spacing: 2px;
            text-transform: uppercase; color: var(--muted);
            margin-bottom: 36px; flex-shrink: 0;
        }
        .controls-row { display: flex; flex-direction: column; align-items: center; gap: 20px; flex-shrink: 0; }
        .btn-play {
            width: 68px; height: 68px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 0 8px rgba(61,127,255,0.1), 0 0 0 16px rgba(61,127,255,0.05);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation; user-select: none; -webkit-user-select: none;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.3s, background 0.3s;
            flex-shrink: 0;
        }
        .btn-play:active { transform: scale(0.92); }
        @media(hover:hover){
            .btn-play:not(.offline):hover {
                transform: scale(1.07);
                box-shadow: 0 0 0 10px rgba(61,127,255,0.15), 0 0 0 22px rgba(61,127,255,0.07);
            }
        }
        .btn-play.offline { background: #1a2130; box-shadow: none; cursor: default; opacity: 0.4; }
        .spin-icon { animation: spin 1s linear infinite; }
        @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        .vol-bar {
            display: flex; align-items: center; gap: 12px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 99px; padding: 10px 20px; flex-shrink: 0;
        }
        .vol-icon { color: var(--muted); display: flex; align-items: center; flex-shrink: 0; }
        input[type=range] {
            -webkit-appearance: none; appearance: none;
            width: clamp(120px, 30vw, 180px); height: 4px;
            background: rgba(255,255,255,0.1); border-radius: 99px;
            outline: none; cursor: pointer; touch-action: pan-x;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px; height: 20px; border-radius: 50%;
            background: var(--accent); border: 2px solid #050810;
            box-shadow: 0 0 6px rgba(61,127,255,0.5); margin-top: -8px;
        }
        input[type=range]::-moz-range-thumb {
            width: 20px; height: 20px; border-radius: 50%;
            background: var(--accent); border: 2px solid #050810;
        }
        .vol-label { font-size: 12px; color: var(--muted); min-width: 36px; text-align: right; font-weight: 600; flex-shrink: 0; }
        .bottombar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            padding: 14px 24px;
            border-top: 1px solid var(--border);
            background: rgba(5,8,16,0.9);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .listener-pill {
            font-size: 12px; color: var(--muted);
            background: var(--surface); border: 1px solid var(--border);
            padding: 5px 16px; border-radius: 99px;
            letter-spacing: 0.3px; white-space: nowrap;
        }
        audio { display: none; }
    </style>
</head>
<body>
<div class="bg-blur"></div>

<div class="topbar">
    <div class="logo">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 0 1 9 9 9 9 0 0 1-9 9A9 9 0 0 1 3 12 9 9 0 0 1 12 3zm0 4a5 5 0 1 0 0 10A5 5 0 0 0 12 7zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/></svg>
        </div>
        <span class="logo-text">MEHMET <span>SAM</span></span>
    </div>
    <div class="status-pill" id="liveBadge">
        <div class="status-dot"></div>
        <span id="liveText">Offline</span>
    </div>
</div>

<div class="main">
    <div class="visualizer" id="visualizer">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <div class="song-hint">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <span id="songStatus">Bağlanılıyor...</span>
    </div>

    <div class="song-title" id="songTitle">—</div>
    <div class="station-label">MEHMET SAM RADYO</div>

    <div class="controls-row">
        <button class="btn-play offline" id="playBtn" aria-label="Oynat / Durdur">
            <svg id="icoPlay" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
            <svg id="icoPause" style="display:none" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            <svg id="icoLoad" style="display:none" class="spin-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/>
                <path d="M2 12h4"/><path d="M18 12h4"/><path d="M4.93 19.07l2.83-2.83"/><path d="M16.24 7.76l2.83-2.83"/>
            </svg>
        </button>
        <div class="vol-bar">
            <div class="vol-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                </svg>
            </div>
            <input type="range" id="volSlider" min="0" max="100" value="80" step="1">
            <span class="vol-label" id="volLabel">80%</span>
        </div>
    </div>
</div>

<div class="bottombar">
    <div class="listener-pill" id="footerInfo">Yayın bekleniyor</div>
</div>

<audio id="audio" preload="none" playsinline webkit-playsinline x-webkit-airplay="allow"></audio>

<script>
(() => {
'use strict';

const API        = 'https://yo-yo-backing-paralyze.ngrok-free.dev';
const API_STREAM = 'https://radyo-proxy.gower45651.workers.dev';
const POLL_MS    = 3000;
const NGROK_H    = { 'ngrok-skip-browser-warning': '1', 'Cache-Control': 'no-cache' };

const audio      = document.getElementById('audio');
const playBtn    = document.getElementById('playBtn');
const icoPlay    = document.getElementById('icoPlay');
const icoPause   = document.getElementById('icoPause');
const icoLoad    = document.getElementById('icoLoad');
const visualizer = document.getElementById('visualizer');
const songTitle  = document.getElementById('songTitle');
const songStatus = document.getElementById('songStatus');
const liveBadge  = document.getElementById('liveBadge');
const liveText   = document.getElementById('liveText');
const footerInfo = document.getElementById('footerInfo');
const volSlider  = document.getElementById('volSlider');
const volLabel   = document.getElementById('volLabel');

/* DURUM */
let playing        = false;   // kullanıcı oynatıyor mu
let broadcasting   = false;   // sunucu yayın yapıyor mu
let currentSong    = '';
let currentStart   = 0;
let volume         = 0.8;
let retryTimer     = null;
let retryCount     = 0;
const MAX_RETRY    = 6;
const RETRY_MS     = [800, 1500, 2500, 4000, 6000, 8000];

audio.volume = volume;

/* SES */
function syncVol() {
    volume = volSlider.value / 100;
    audio.volume = volume;
    volLabel.textContent = volSlider.value + '%';
}
volSlider.addEventListener('input', syncVol);
volSlider.addEventListener('change', syncVol);
volSlider.addEventListener('touchmove', syncVol, { passive: true });

/* UI */
function showIcon(n) {
    icoPlay.style.display  = n === 'play'  ? '' : 'none';
    icoPause.style.display = n === 'pause' ? '' : 'none';
    icoLoad.style.display  = n === 'load'  ? '' : 'none';
}
function setPlaying(on) {
    playing = on;
    showIcon(on ? 'pause' : 'play');
    visualizer.classList.toggle('playing', on);
}
function setBroadcasting(on) {
    broadcasting = on;
    liveBadge.classList.toggle('live', on);
    liveText.textContent = on ? 'BAĞLANDI' : 'Offline';
    playBtn.classList.toggle('offline', !on);
    playBtn.style.opacity = on ? '' : '0.4';
}
function setTitle(t) {
    if (t === songTitle.textContent) return;
    songTitle.style.opacity = '0';
    setTimeout(() => { songTitle.textContent = t; songTitle.style.opacity = '1'; }, 220);
}
function setStatus(t) { songStatus.textContent = t; }
function showLoading(on) {
    showIcon(on ? 'load' : (playing ? 'pause' : 'play'));
    playBtn.classList.toggle('loading', on);
}

/*
 * OYNATMA STRATEJİSİ
 * MSE buffer birikimi sorununu köklünden çözmek için:
 * Audio'yu direkt stream URL ile başlatıyoruz.
 * Tarayıcı native HTTP streaming yapıyor — buffer birikmez çünkü
 * sunucu zaten canlı yayın gönderiyor, tarayıcı "live" modda çalışıyor.
 * Şarkı değişince (start_time farkı) ses kaynağını yeniliyoruz,
 * currentTime'ı sıfırlıyoruz — kesintisiz geçiş.
 */
function buildStreamUrl() {
    return API_STREAM + '/stream?t=' + Date.now();
}

function startAudio() {
    clearTimeout(retryTimer);
    showLoading(true);
    setStatus('Bağlanıyor...');

    audio.pause();
    audio.src = '';
    audio.load();

    /* Kısa gecikme — src sıfırlanmasını bekle */
    setTimeout(() => {
        audio.src = buildStreamUrl();
        audio.volume = volume;
        audio.load();
        const p = audio.play();
        if (p && p.catch) p.catch(() => scheduleRetry());
    }, 80);
}

function stopAudio(reason) {
    clearTimeout(retryTimer);
    retryCount = 0;
    audio.pause();
    audio.src = '';
    setPlaying(false);
    showLoading(false);
    setStatus(reason || 'Durduruldu');
}

function scheduleRetry() {
    if (!playing || !broadcasting) return;
    if (retryCount >= MAX_RETRY) {
        retryCount = 0;
        setStatus('Bağlanamadı — tekrar dene');
        showLoading(false);
        showIcon('play');
        return;
    }
    const ms = RETRY_MS[Math.min(retryCount, RETRY_MS.length - 1)];
    retryCount++;
    retryTimer = setTimeout(startAudio, ms);
}

/* AUDIO OLAYLARI — kullanıcıya HİÇBİR yükleniyor/tamponlanıyor mesajı göstermiyoruz */
audio.addEventListener('playing', () => {
    clearTimeout(retryTimer);
    retryCount = 0;
    showLoading(false);
    setPlaying(true);
    setStatus('Dinleniyor');
});

/* waiting / stalled / error — ses arkaplanda kendi kendine çözmeye çalışır.
   UI'a DOKUNMUYORUZ. Sadece çok uzun sürerse yeniden bağlanıyoruz. */
let stallTimer = null;
function onStall() {
    if (!playing || !broadcasting) return;
    clearTimeout(stallTimer);
    /* 2.5 saniye boyunca ses gelmezse yeniden bağlan — kullanıcı fark etmeden */
    stallTimer = setTimeout(() => {
        if (!playing || !broadcasting) return;
        retryCount = 0;
        startAudio();
    }, 2500);
}
function onResume() {
    clearTimeout(stallTimer);
}

audio.addEventListener('waiting',  onStall);
audio.addEventListener('stalled',  onStall);
audio.addEventListener('suspend',  onStall);
audio.addEventListener('playing',  onResume);
audio.addEventListener('progress', onResume);
audio.addEventListener('canplay',  onResume);

audio.addEventListener('error', () => {
    if (!playing || !broadcasting) return;
    clearTimeout(stallTimer);
    scheduleRetry();
});

audio.addEventListener('ended', () => {
    if (playing && broadcasting) {
        retryCount = 0;
        startAudio();
    }
});

/* BUTON */
let lastTap = 0;
function handleInteract(e) {
    e.preventDefault();
    e.stopPropagation();
    const now = Date.now();
    if (now - lastTap < 300) return;
    lastTap = now;
    if (!broadcasting) return;

    if (playing) {
        playing = false;
        stopAudio('Durduruldu');
    } else {
        playing = true;
        retryCount = 0;
        startAudio();
    }
}
playBtn.addEventListener('click', handleInteract);
playBtn.addEventListener('touchend', handleInteract, { passive: false });

/* STATUS POLL */
async function checkStatus() {
    try {
        const ctrl = new AbortController();
        const tid = setTimeout(() => ctrl.abort(), 5000);
        const res = await fetch(API + '/status', {
            cache: 'no-store', signal: ctrl.signal, headers: NGROK_H
        });
        clearTimeout(tid);
        if (!res.ok) throw new Error('status ' + res.status);
        const data = await res.json();

        const wasBroadcasting = broadcasting;
        setBroadcasting(data.broadcasting);

        if (data.broadcasting) {
            /* Şarkı adı güncelle */
            if (data.song !== currentSong) {
                setTitle(data.song);
                currentSong = data.song;
                footerInfo.textContent = 'Canlı yayın';
            }

            /* Şarkı DEĞİŞTİ mi? (start_time farkı) */
            const songChanged = currentStart && data.start_time && currentStart !== data.start_time;
            currentStart = data.start_time;

            if (songChanged && playing) {
                /* Yeni şarkıya geç — kullanıcı butona BASMADAN otomatik */
                retryCount = 0;
                startAudio();
            }

            if (!wasBroadcasting) {
                /* Yayın yeni başladı */
                setStatus('Yayın başladı — ▶ bas');
                if (playing) { retryCount = 0; startAudio(); }
            }
        } else {
            /* Yayın yok */
            if (currentSong !== '—') { setTitle('—'); currentSong = '—'; }
            currentStart = 0;
            footerInfo.textContent = 'Yayın bekleniyor';
            if (playing) {
                stopAudio('Şuan yayın yapılmıyor');
                playing = false;
            } else {
                setStatus('Şuan yayın yapılmıyor');
            }
        }
    } catch(e) {
        setBroadcasting(false);
        setTitle('—'); currentSong = '—'; currentStart = 0;
        footerInfo.textContent = 'Bağlantı yok';
        if (!playing) setStatus('Sunucuya ulaşılamıyor');
    }
}

/* SAYFA GÖRÜNÜRLÜKÿ */
document.addEventListener('visibilitychange', () => {
    if (document.hidden) return;
    checkStatus();
    if (playing && broadcasting) { retryCount = 0; startAudio(); }
});
window.addEventListener('online', () => {
    checkStatus();
    if (playing && broadcasting) { retryCount = 0; startAudio(); }
});
window.addEventListener('offline', () => {
    setBroadcasting(false);
    if (!playing) setStatus('İnternet bağlantısı yok');
});

checkStatus();
setInterval(checkStatus, POLL_MS);
})();
</script>
</body>
</html>
