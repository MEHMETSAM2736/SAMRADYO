<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Radyo</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #080c14; --surface: #0e1520; --border: rgba(255,255,255,0.06);
            --accent: #3d7fff; --accent2: #7c3dff; --red: #ff3d5a;
            --text: #e8edf5; --muted: #4a5568; --dim: #1e2a3a;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center; overflow: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(61,127,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(61,127,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none;
        }
        .glow-1 { position: fixed; top: -200px; left: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(61,127,255,0.07) 0%, transparent 70%); pointer-events: none; }
        .glow-2 { position: fixed; bottom: -200px; right: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(124,61,255,0.07) 0%, transparent 70%); pointer-events: none; }
        .card { width: 360px; max-width: calc(100vw - 32px); background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 28px; position: relative; box-shadow: 0 40px 80px rgba(0,0,0,0.6); }
        .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
        .station-name { font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
        .live-badge { display: flex; align-items: center; gap: 6px; background: rgba(255,61,90,0.1); border: 1px solid rgba(255,61,90,0.2); color: var(--red); padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; transition: all 0.3s; }
        .live-badge.offline { background: rgba(74,85,104,0.15); border-color: rgba(74,85,104,0.3); color: var(--muted); }
        .live-dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; }
        .live-badge:not(.offline) .live-dot { animation: pulse-dot 1.4s ease-in-out infinite; }
        @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
        .vinyl-wrap { position: relative; width: 180px; height: 180px; margin: 0 auto 28px; }
        .vinyl { width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #1a1a2e 18%, transparent 18.5%, transparent 19%, #0d0d1a 19%, #0d0d1a 28%, #111122 28%, #111122 35%, #0d0d1a 35%, #0d0d1a 43%, #111122 43%, #111122 50%, #0d0d1a 50%, #0d0d1a 58%, #111122 58%, #111122 65%, #0d0d1a 65%, #0d0d1a 73%, #111122 73%, #111122 80%, #0d0d1a 80%, #0d0d1a 88%, #111122 88%); box-shadow: 0 0 0 2px rgba(255,255,255,0.03), 0 20px 40px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.03); position: relative; }
        .vinyl::after { content: ''; position: absolute; inset: 50%; transform: translate(-50%,-50%); width: 36px; height: 36px; border-radius: 50%; background: radial-gradient(circle, #2a2a3e 0%, #1a1a2e 100%); border: 1px solid rgba(255,255,255,0.08); }
        .vinyl-ring { position: absolute; inset: 19%; border-radius: 50%; background: conic-gradient(var(--accent) 0deg, var(--accent2) 120deg, #ff3d7f 240deg, var(--accent) 360deg); opacity: 0; transition: opacity 0.6s; }
        .vinyl-ring::after { content: ''; position: absolute; inset: 15%; border-radius: 50%; background: var(--bg); }
        .vinyl-wrap.spinning .vinyl-ring { opacity: 0.6; }
        .vinyl-wrap.spinning .vinyl { animation: spin 3s linear infinite; box-shadow: 0 0 0 2px rgba(255,255,255,0.03), 0 20px 50px rgba(61,127,255,0.2), 0 0 30px rgba(61,127,255,0.1), inset 0 0 0 1px rgba(255,255,255,0.03); }
        @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        .song-info { text-align: center; margin-bottom: 28px; min-height: 52px; }
        .song-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; transition: opacity 0.3s; line-height: 1.3; word-break: break-word; }
        .song-status { font-size: 12px; font-weight: 400; color: var(--muted); letter-spacing: 0.5px; }
        .visualizer { display: flex; align-items: flex-end; justify-content: center; gap: 3px; height: 28px; margin-bottom: 24px; }
        .bar { width: 3px; height: 3px; border-radius: 2px; background: var(--accent); }
        .playing .bar:nth-child(1){animation:wave 0.9s ease-in-out infinite 0.0s}
        .playing .bar:nth-child(2){animation:wave 0.9s ease-in-out infinite 0.1s}
        .playing .bar:nth-child(3){animation:wave 0.9s ease-in-out infinite 0.2s}
        .playing .bar:nth-child(4){animation:wave 0.9s ease-in-out infinite 0.3s}
        .playing .bar:nth-child(5){animation:wave 0.9s ease-in-out infinite 0.4s}
        .playing .bar:nth-child(6){animation:wave 0.9s ease-in-out infinite 0.3s}
        .playing .bar:nth-child(7){animation:wave 0.9s ease-in-out infinite 0.2s}
        .playing .bar:nth-child(8){animation:wave 0.9s ease-in-out infinite 0.1s}
        .playing .bar:nth-child(9){animation:wave 0.9s ease-in-out infinite 0.0s}
        .playing .bar:nth-child(10){animation:wave 0.9s ease-in-out infinite 0.1s}
        .playing .bar:nth-child(11){animation:wave 0.9s ease-in-out infinite 0.2s}
        .playing .bar:nth-child(12){animation:wave 0.9s ease-in-out infinite 0.3s}
        @keyframes wave { 0%,100%{height:3px} 50%{height:22px} }
        .controls { display: flex; align-items: center; justify-content: center; }
        .btn-play { width: 72px; height: 72px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.25s; box-shadow: 0 8px 24px rgba(61,127,255,0.35); -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .btn-play:hover { transform: scale(1.07); box-shadow: 0 12px 32px rgba(61,127,255,0.5); }
        .btn-play:active { transform: scale(0.92); }
        .btn-play.offline { background: var(--dim); box-shadow: none; cursor: not-allowed; opacity: 0.5; }
        .btn-play.offline:hover { transform: none; }
        .btn-play.loading { animation: pulse-btn 0.8s ease-in-out infinite; }
        @keyframes pulse-btn { 0%,100%{opacity:1} 50%{opacity:0.6} }
        .volume-wrap { display: flex; align-items: center; gap: 8px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
        .vol-icon { color: var(--muted); flex-shrink: 0; }
        input[type=range] { -webkit-appearance: none; flex: 1; height: 4px; background: var(--dim); border-radius: 99px; outline: none; cursor: pointer; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); border: 2px solid var(--surface); box-shadow: 0 0 6px rgba(61,127,255,0.5); }
        .vol-label { font-size: 11px; color: var(--muted); min-width: 32px; text-align: right; }
        .footer { margin-top: 20px; display: flex; justify-content: center; }
        .listener-pill { font-size: 11px; color: var(--muted); background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 4px 12px; border-radius: 99px; }
        audio { display: none; }
    </style>
</head>
<body>
    <div class="glow-1"></div>
    <div class="glow-2"></div>
    <div class="card">
        <div class="topbar">
            <span class="station-name">Radyo</span>
            <div class="live-badge offline" id="liveBadge">
                <div class="live-dot"></div>
                <span id="liveText">Offline</span>
            </div>
        </div>
        <div class="vinyl-wrap" id="vinylWrap">
            <div class="vinyl-ring"></div>
            <div class="vinyl"></div>
        </div>
        <div class="song-info">
            <div class="song-title" id="songTitle">—</div>
            <div class="song-status" id="songStatus">Sunucuya bağlanılıyor...</div>
        </div>
        <div class="visualizer" id="visualizer">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <div class="controls">
            <button class="btn-play offline" id="playBtn">
                <svg id="playIcon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                <svg id="pauseIcon" style="display:none" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                <svg id="loadIcon" style="display:none" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1s" repeatCount="indefinite"/></path></svg>
            </button>
        </div>
        <div class="volume-wrap">
            <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
            <input type="range" id="volumeSlider" min="0" max="100" value="80" oninput="setVolume(this.value)">
            <span class="vol-label" id="volLabel">80%</span>
        </div>
        <div class="footer">
            <div class="listener-pill" id="listenerInfo">Yayın bekleniyor</div>
        </div>
    </div>
    <audio id="audio" preload="none" playsinline webkit-playsinline x-webkit-airplay="allow"></audio>

    <script>
        const API = 'https://yo-yo-backing-paralyze.ngrok-free.dev';

        const audio        = document.getElementById('audio');
        const playBtn      = document.getElementById('playBtn');
        const playIcon     = document.getElementById('playIcon');
        const pauseIcon    = document.getElementById('pauseIcon');
        const loadIcon     = document.getElementById('loadIcon');
        const vinylWrap    = document.getElementById('vinylWrap');
        const visualizer   = document.getElementById('visualizer');
        const songTitle    = document.getElementById('songTitle');
        const songStatus   = document.getElementById('songStatus');
        const liveBadge    = document.getElementById('liveBadge');
        const liveText     = document.getElementById('liveText');
        const listenerInfo = document.getElementById('listenerInfo');

        let isPlaying      = false;
        let isLoading      = false;
        let isBroadcasting = false;
        let currentSong    = '';
        let currentStartTime = 0;
        let volume         = 0.8;
        let retryCount     = 0;
        const MAX_RETRY    = 3;

        audio.volume = volume;

        // ── Buton tıklama - hem mouse hem touch ──────────────────────
        playBtn.addEventListener('click', togglePlay);
        playBtn.addEventListener('touchend', function(e) {
            e.preventDefault(); // Ghost click önle
            togglePlay();
        });

        function setVolume(val) {
            volume = val / 100;
            audio.volume = volume;
            document.getElementById('volLabel').textContent = val + '%';
        }

        function setIcon(state) {
            // state: 'play' | 'pause' | 'load'
            playIcon.style.display  = state === 'play'  ? 'block' : 'none';
            pauseIcon.style.display = state === 'pause' ? 'block' : 'none';
            loadIcon.style.display  = state === 'load'  ? 'block' : 'none';
        }

        function setPlayingUI(playing) {
            isPlaying = playing;
            isLoading = false;
            setIcon(playing ? 'pause' : 'play');
            vinylWrap.classList.toggle('spinning', playing);
            visualizer.classList.toggle('playing', playing);
            playBtn.classList.remove('loading');
        }

        function setLoadingUI() {
            isLoading = true;
            setIcon('load');
            playBtn.classList.add('loading');
        }

        function setBroadcastingUI(on) {
            isBroadcasting = on;
            liveBadge.classList.toggle('offline', !on);
            liveText.textContent = on ? 'CANLI' : 'Offline';
            playBtn.classList.toggle('offline', !on);
        }

        function updateSongTitle(title, fade) {
            if (fade && title !== songTitle.textContent) {
                songTitle.style.opacity = 0;
                setTimeout(() => { songTitle.textContent = title; songTitle.style.opacity = 1; }, 250);
            } else {
                songTitle.textContent = title;
            }
        }

        // ── Play / Pause ─────────────────────────────────────────────
        function togglePlay() {
            if (!isBroadcasting || isLoading) return;

            if (isPlaying) {
                audio.pause();
                audio.src = '';
                audio.load();
                setPlayingUI(false);
                songStatus.textContent = 'Duraklatıldı';
                retryCount = 0;
            } else {
                startStream();
            }
        }

        function startStream() {
            setLoadingUI();
            songStatus.textContent = 'Bağlanıyor...';
            retryCount = 0;

            // Eski stream'i temizle
            audio.pause();
            audio.src = '';
            audio.load();

            // Kısa bir gecikme ile başlat (iOS için kritik)
            setTimeout(() => {
                audio.src = API + '/stream?t=' + Date.now();
                audio.volume = volume;

                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise
                        .then(() => {
                            setPlayingUI(true);
                            songStatus.textContent = 'Dinleniyor';
                        })
                        .catch(err => {
                            console.error('Play hatası:', err);
                            setPlayingUI(false);
                            songStatus.textContent = 'Tekrar dene →';
                            // iOS'ta bazen ikinci denemede çalışır
                            if (retryCount < MAX_RETRY) {
                                retryCount++;
                                setTimeout(startStream, 800);
                            }
                        });
                }
            }, 100);
        }

        // ── Ses olayları ─────────────────────────────────────────────
        audio.addEventListener('canplay', () => {
            if (isLoading) {
                audio.play().then(() => {
                    setPlayingUI(true);
                    songStatus.textContent = 'Dinleniyor';
                }).catch(() => {});
            }
        });

        audio.addEventListener('ended', () => {
            setPlayingUI(false);
            songStatus.textContent = 'Yayın bitti';
        });

        audio.addEventListener('error', (e) => {
            console.error('Audio error:', e);
            if (isPlaying || isLoading) {
                setPlayingUI(false);
                if (retryCount < MAX_RETRY && isBroadcasting) {
                    retryCount++;
                    songStatus.textContent = `Yeniden bağlanıyor... (${retryCount})`;
                    setTimeout(startStream, 1500);
                } else {
                    songStatus.textContent = 'Bağlantı kesildi, play\'e bas';
                }
            }
        });

        audio.addEventListener('stalled', () => {
            if (isPlaying) {
                songStatus.textContent = 'Tamponlanıyor...';
            }
        });

        audio.addEventListener('playing', () => {
            setPlayingUI(true);
            songStatus.textContent = 'Dinleniyor';
        });

        // ── Durum kontrolü ───────────────────────────────────────────
        async function checkStatus() {
            try {
                const res = await fetch(API + '/status', {
                    cache: 'no-store',
                    headers: { 'ngrok-skip-browser-warning': '1' }
                });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();

                const wasBroadcasting = isBroadcasting;
                setBroadcastingUI(data.broadcasting);

                const songChanged = currentStartTime && data.start_time && currentStartTime !== data.start_time;

                if (data.broadcasting) {
                    if (data.song !== currentSong) {
                        updateSongTitle(data.song, true);
                        currentSong = data.song;
                        listenerInfo.textContent = 'Canlı yayında';
                    }
                    currentStartTime = data.start_time;

                    if (songChanged && isPlaying) {
                        console.log('Şarkı değişti, yenileniyor...');
                        startStream();
                    }

                    if (!wasBroadcasting && !isPlaying && !isLoading) {
                        songStatus.textContent = 'Yayın başladı — play\'e bas';
                    }
                } else {
                    updateSongTitle('—', currentSong !== '—');
                    currentSong = '—';
                    currentStartTime = 0;
                    listenerInfo.textContent = 'Yayın bekleniyor';
                    if (!isLoading) songStatus.textContent = 'Şuan yayın yapılmıyor';
                    if (isPlaying || isLoading) {
                        audio.pause(); audio.src = ''; audio.load();
                        setPlayingUI(false);
                    }
                }
            } catch (err) {
                setBroadcastingUI(false);
                updateSongTitle('—');
                currentSong = '—'; currentStartTime = 0;
                listenerInfo.textContent = 'Bağlantı yok';
                if (!isLoading) songStatus.textContent = 'Sunucuya ulaşılamıyor';
                if (isPlaying || isLoading) {
                    audio.pause(); audio.src = ''; audio.load();
                    setPlayingUI(false);
                }
            }
        }

        checkStatus();
        setInterval(checkStatus, 2500);
    </script>
</body>
</html>
