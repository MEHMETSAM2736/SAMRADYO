<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Canlı Radyo</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #080c14; --surface: #0e1520; --border: rgba(255,255,255,0.06);
            --accent: #3d7fff; --accent2: #7c3dff; --red: #ff3d5a;
            --text: #e8edf5; --muted: #4a5568; --dim: #1e2a3a;
        }
        html, body { height: 100%; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center;
            overflow: hidden; -webkit-font-smoothing: antialiased;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(61,127,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(61,127,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 0;
        }
        .glow-1 { position: fixed; top: -200px; left: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(61,127,255,0.07) 0%, transparent 70%); pointer-events: none; }
        .glow-2 { position: fixed; bottom: -200px; right: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(124,61,255,0.07) 0%, transparent 70%); pointer-events: none; }
        .card {
            width: 360px; max-width: calc(100vw - 32px);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 32px 28px;
            position: relative; z-index: 1;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }
        .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
        .station-name { font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
        .live-badge { display: flex; align-items: center; gap: 6px; background: rgba(255,61,90,0.1); border: 1px solid rgba(255,61,90,0.2); color: var(--red); padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; transition: all 0.4s; }
        .live-badge.offline { background: rgba(74,85,104,0.15); border-color: rgba(74,85,104,0.3); color: var(--muted); }
        .live-dot { width: 6px; height: 6px; background: currentColor; border-radius: 50%; }
        .live-badge:not(.offline) .live-dot { animation: blink 1.4s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .vinyl-wrap { position: relative; width: 180px; height: 180px; margin: 0 auto 28px; }
        .vinyl { width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle at 50% 50%,
                #1a1a2e 0%,#1a1a2e 18%,transparent 18.5%,transparent 19%,
                #0d0d1a 19%,#0d0d1a 28%,#111122 28%,#111122 35%,
                #0d0d1a 35%,#0d0d1a 43%,#111122 43%,#111122 50%,
                #0d0d1a 50%,#0d0d1a 58%,#111122 58%,#111122 65%,
                #0d0d1a 65%,#0d0d1a 73%,#111122 73%,#111122 80%,
                #0d0d1a 80%,#0d0d1a 88%,#111122 88%);
            box-shadow: 0 0 0 2px rgba(255,255,255,0.03),0 20px 40px rgba(0,0,0,0.6);
            position: relative; will-change: transform;
        }
        .vinyl::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:36px; height:36px; border-radius:50%; background:radial-gradient(circle,#2a2a3e 0%,#1a1a2e 100%); border:1px solid rgba(255,255,255,0.08); }
        .vinyl-ring { position:absolute; inset:19%; border-radius:50%; background:conic-gradient(var(--accent) 0deg,var(--accent2) 120deg,#ff3d7f 240deg,var(--accent) 360deg); opacity:0; transition:opacity 0.6s; }
        .vinyl-ring::after { content:''; position:absolute; inset:15%; border-radius:50%; background:var(--bg); }
        .vinyl-wrap.spinning .vinyl-ring { opacity:0.6; }
        .vinyl-wrap.spinning .vinyl { animation:spin 3s linear infinite; box-shadow:0 0 0 2px rgba(255,255,255,0.03),0 20px 50px rgba(61,127,255,0.25),0 0 40px rgba(61,127,255,0.15); }
        @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

        .song-info { text-align:center; margin-bottom:24px; min-height:52px; }
        .song-title { font-size:16px; font-weight:600; color:var(--text); margin-bottom:4px; transition:opacity 0.3s; line-height:1.3; word-break:break-word; padding:0 4px; }
        .song-status { font-size:12px; color:var(--muted); }

        .visualizer { display:flex; align-items:flex-end; justify-content:center; gap:3px; height:28px; margin-bottom:24px; }
        .bar { width:3px; height:3px; border-radius:2px; background:var(--accent); transition:background 0.3s; }
        .playing .bar:nth-child(1){animation:wave 0.9s ease-in-out infinite 0.00s}
        .playing .bar:nth-child(2){animation:wave 0.9s ease-in-out infinite 0.08s}
        .playing .bar:nth-child(3){animation:wave 0.9s ease-in-out infinite 0.16s}
        .playing .bar:nth-child(4){animation:wave 0.9s ease-in-out infinite 0.24s}
        .playing .bar:nth-child(5){animation:wave 0.9s ease-in-out infinite 0.32s}
        .playing .bar:nth-child(6){animation:wave 0.9s ease-in-out infinite 0.40s}
        .playing .bar:nth-child(7){animation:wave 0.9s ease-in-out infinite 0.32s}
        .playing .bar:nth-child(8){animation:wave 0.9s ease-in-out infinite 0.24s}
        .playing .bar:nth-child(9){animation:wave 0.9s ease-in-out infinite 0.16s}
        .playing .bar:nth-child(10){animation:wave 0.9s ease-in-out infinite 0.08s}
        .playing .bar:nth-child(11){animation:wave 0.9s ease-in-out infinite 0.00s}
        .playing .bar:nth-child(12){animation:wave 0.9s ease-in-out infinite 0.08s}
        @keyframes wave { 0%,100%{height:3px} 50%{height:22px} }

        .controls { display:flex; align-items:center; justify-content:center; }
        .btn-play {
            width:72px; height:72px; border-radius:50%; border:none;
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            color:white; cursor:pointer; display:flex; align-items:center; justify-content:center;
            transition:transform 0.2s, box-shadow 0.2s, background 0.3s;
            box-shadow:0 8px 24px rgba(61,127,255,0.4);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none; -webkit-user-select: none;
        }
        .btn-play:active { transform:scale(0.92) !important; }
        .btn-play.ready:hover { transform:scale(1.07); box-shadow:0 12px 32px rgba(61,127,255,0.55); }
        .btn-play.offline { background:var(--dim); box-shadow:none; cursor:default; opacity:0.4; }
        .btn-play.loading { background:linear-gradient(135deg,var(--accent),var(--accent2)); animation:pulse-btn 1s ease-in-out infinite; }
        @keyframes pulse-btn { 0%,100%{opacity:1} 50%{opacity:0.55} }
        .spin-icon { animation: spin 1s linear infinite; }

        .volume-wrap { display:flex; align-items:center; gap:8px; margin-top:20px; padding-top:20px; border-top:1px solid var(--border); }
        .vol-icon { color:var(--muted); flex-shrink:0; }
        input[type=range] { -webkit-appearance:none; flex:1; height:4px; background:var(--dim); border-radius:99px; outline:none; cursor:pointer; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--accent); border:2px solid var(--surface); box-shadow:0 0 8px rgba(61,127,255,0.5); }
        .vol-label { font-size:11px; color:var(--muted); min-width:32px; text-align:right; }

        .footer { margin-top:20px; display:flex; justify-content:center; }
        .listener-pill { font-size:11px; color:var(--muted); background:rgba(255,255,255,0.03); border:1px solid var(--border); padding:4px 12px; border-radius:99px; }

        audio { display:none; }
    </style>
</head>
<body>
    <div class="glow-1"></div>
    <div class="glow-2"></div>
    <div class="card">
        <div class="topbar">
            <span class="station-name">Radyo</span>
            <div class="live-badge offline" id="liveBadge">
                <div class="live-dot"></div>
                <span id="liveText">Offline</span>
            </div>
        </div>
        <div class="vinyl-wrap" id="vinylWrap">
            <div class="vinyl-ring"></div>
            <div class="vinyl"></div>
        </div>
        <div class="song-info">
            <div class="song-title" id="songTitle">—</div>
            <div class="song-status" id="songStatus">Bağlanılıyor...</div>
        </div>
        <div class="visualizer" id="visualizer">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
        <div class="controls">
            <button class="btn-play offline" id="playBtn">
                <!-- Play -->
                <svg id="icoPlay" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                <!-- Pause -->
                <svg id="icoPause" style="display:none" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                <!-- Loading spinner -->
                <svg id="icoLoad" style="display:none" class="spin-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/>
                    <path d="M16.24 16.24l2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/>
                    <path d="M4.93 19.07l2.83-2.83"/><path d="M16.24 7.76l2.83-2.83"/>
                </svg>
            </button>
        </div>
        <div class="volume-wrap">
            <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
            <input type="range" id="volSlider" min="0" max="100" value="80">
            <span class="vol-label" id="volLabel">80%</span>
        </div>
        <div class="footer">
            <div class="listener-pill" id="footerInfo">Yayın bekleniyor</div>
        </div>
    </div>

    <!-- playsinline iOS için zorunlu -->
    <audio id="audio" preload="none" playsinline webkit-playsinline x-webkit-airplay="allow"></audio>

    <script>
    (() => {
        const API = 'https://yo-yo-backing-paralyze.ngrok-free.dev';

        const audio      = document.getElementById('audio');
        const playBtn    = document.getElementById('playBtn');
        const icoPlay    = document.getElementById('icoPlay');
        const icoPause   = document.getElementById('icoPause');
        const icoLoad    = document.getElementById('icoLoad');
        const vinylWrap  = document.getElementById('vinylWrap');
        const visualizer = document.getElementById('visualizer');
        const songTitle  = document.getElementById('songTitle');
        const songStatus = document.getElementById('songStatus');
        const liveBadge  = document.getElementById('liveBadge');
        const liveText   = document.getElementById('liveText');
        const footerInfo = document.getElementById('footerInfo');
        const volSlider  = document.getElementById('volSlider');
        const volLabel   = document.getElementById('volLabel');

        // ── State ─────────────────────────────────────────────────
        const S = { IDLE: 0, LOADING: 1, PLAYING: 2 };
        let state          = S.IDLE;
        let isBroadcasting = false;
        let currentSong    = '';
        let currentStart   = 0;
        let volume         = 0.8;
        let retryTimer     = null;
        let retries        = 0;
        const MAX_RETRIES  = 5;

        audio.volume = volume;

        // ── Volume ────────────────────────────────────────────────
        volSlider.addEventListener('input', () => {
            volume = volSlider.value / 100;
            audio.volume = volume;
            volLabel.textContent = volSlider.value + '%';
        });

        // ── UI helpers ────────────────────────────────────────────
        function showIcon(name) {
            icoPlay.style.display  = name === 'play'  ? '' : 'none';
            icoPause.style.display = name === 'pause' ? '' : 'none';
            icoLoad.style.display  = name === 'load'  ? '' : 'none';
        }

        function applyState(s) {
            state = s;
            const playing = s === S.PLAYING;
            const loading = s === S.LOADING;

            showIcon(loading ? 'load' : playing ? 'pause' : 'play');
            vinylWrap.classList.toggle('spinning', playing);
            visualizer.classList.toggle('playing', playing);
            playBtn.classList.toggle('loading', loading);
            playBtn.classList.toggle('ready', !loading && isBroadcasting);
        }

        function setBroadcast(on) {
            isBroadcasting = on;
            liveBadge.classList.toggle('offline', !on);
            liveText.textContent = on ? 'CANLI' : 'Offline';
            playBtn.classList.toggle('offline', !on);
            if (on) playBtn.classList.add('ready');
        }

        function setTitle(t, fade) {
            if (!fade || t === songTitle.textContent) { songTitle.textContent = t; return; }
            songTitle.style.opacity = '0';
            setTimeout(() => { songTitle.textContent = t; songTitle.style.opacity = '1'; }, 250);
        }

        // ── Stream ────────────────────────────────────────────────
        function clearAudio() {
            audio.pause();
            audio.src = '';
            try { audio.load(); } catch(e){}
        }

        function doPlay() {
            clearAudio();
            applyState(S.LOADING);
            songStatus.textContent = 'Bağlanıyor...';

            audio.src = API + '/stream?t=' + Date.now();
            audio.volume = volume;

            // load() çağrısı bazen iOS'ta gerekli
            audio.load();

            const p = audio.play();
            if (p && p.then) {
                p.then(() => {
                    // playing event zaten halleder ama yine de
                }).catch(err => {
                    console.warn('play() reject:', err.name, err.message);
                    // NotAllowedError = kullanıcı etkileşimi gerekli (bu olmamalı çünkü buton tıklandı)
                    // NotSupportedError = codec sorunu
                    // AbortError = load() interrupt etti — yeniden dene
                    if (err.name === 'AbortError' && retries < MAX_RETRIES) {
                        retries++;
                        clearRetry();
                        retryTimer = setTimeout(doPlay, 600);
                    } else {
                        applyState(S.IDLE);
                        songStatus.textContent = 'Hata — tekrar dene';
                    }
                });
            }
        }

        function clearRetry() {
            if (retryTimer) { clearTimeout(retryTimer); retryTimer = null; }
        }

        function stopPlay() {
            clearRetry();
            clearAudio();
            applyState(S.IDLE);
            songStatus.textContent = 'Durduruldu';
            retries = 0;
        }

        // ── Buton ────────────────────────────────────────────────
        function handleTap() {
            if (!isBroadcasting) return;
            if (state === S.LOADING) return; // Zaten yükleniyor, bekle
            if (state === S.PLAYING) {
                stopPlay();
            } else {
                retries = 0;
                doPlay();
            }
        }

        // Hem click hem touchend — ama çift tetiklenmeyi önle
        let lastTap = 0;
        function onInteract(e) {
            e.preventDefault();
            const now = Date.now();
            if (now - lastTap < 300) return; // debounce
            lastTap = now;
            handleTap();
        }

        playBtn.addEventListener('click', onInteract);
        playBtn.addEventListener('touchend', onInteract, { passive: false });

        // ── Audio events ─────────────────────────────────────────
        audio.addEventListener('playing', () => {
            clearRetry();
            retries = 0;
            applyState(S.PLAYING);
            songStatus.textContent = 'Dinleniyor';
        });

        audio.addEventListener('waiting', () => {
            if (state === S.PLAYING) songStatus.textContent = 'Tamponlanıyor...';
        });

        audio.addEventListener('canplay', () => {
            if (state === S.LOADING) {
                audio.play().catch(() => {});
            }
        });

        audio.addEventListener('ended', () => {
            applyState(S.IDLE);
            songStatus.textContent = 'Yayın bitti';
        });

        audio.addEventListener('error', (e) => {
            if (state === S.IDLE) return;
            const code = audio.error ? audio.error.code : '?';
            console.warn('audio error code:', code);
            if (retries < MAX_RETRIES && isBroadcasting) {
                retries++;
                songStatus.textContent = `Yeniden bağlanıyor (${retries}/${MAX_RETRIES})...`;
                clearRetry();
                retryTimer = setTimeout(doPlay, 1500);
            } else {
                applyState(S.IDLE);
                songStatus.textContent = 'Bağlantı kesildi — play\'e bas';
                retries = 0;
            }
        });

        // ── Status poll ──────────────────────────────────────────
        async function checkStatus() {
            try {
                const res = await fetch(API + '/status', {
                    cache: 'no-store',
                    headers: { 'ngrok-skip-browser-warning': '1' }
                });
                if (!res.ok) throw new Error(res.status);
                const data = await res.json();

                const wasBroadcasting = isBroadcasting;
                setBroadcast(data.broadcasting);

                if (data.broadcasting) {
                    const songChanged = currentStart && data.start_time && currentStart !== data.start_time;

                    if (data.song !== currentSong) {
                        setTitle(data.song, true);
                        currentSong = data.song;
                        footerInfo.textContent = 'Canlı yayın';
                    }
                    currentStart = data.start_time;

                    // Şarkı değiştiyse stream'i yenile
                    if (songChanged && state === S.PLAYING) {
                        doPlay();
                    }
                    // Yayın yeni başladıysa bildir
                    if (!wasBroadcasting && state === S.IDLE) {
                        songStatus.textContent = "Yayın başladı — ▶ bas";
                    }
                } else {
                    setTitle('—', currentSong !== '—');
                    currentSong = '—'; currentStart = 0;
                    footerInfo.textContent = 'Yayın bekleniyor';
                    if (state !== S.IDLE) {
                        stopPlay();
                        songStatus.textContent = 'Şuan yayın yapılmıyor';
                    } else {
                        songStatus.textContent = 'Şuan yayın yapılmıyor';
                    }
                }
            } catch (err) {
                setBroadcast(false);
                setTitle('—');
                footerInfo.textContent = 'Bağlantı yok';
                songStatus.textContent = 'Sunucuya ulaşılamıyor';
                if (state !== S.IDLE) stopPlay();
                currentSong = '—'; currentStart = 0;
            }
        }

        checkStatus();
        setInterval(checkStatus, 3000);
    })();
    </script>
</body>
</html>
