<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#060810">
    <title>Mehmet Sam Radyo</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#060810;--accent:#2d6fff;--accent2:#6b2dff;--text:#e8edf5;--muted:#4a5568;--dim:#111827;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07)}
        html,body{height:100%;width:100%;-webkit-text-size-adjust:100%}
        body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
        .ambient{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 50% -10%,rgba(45,111,255,0.18) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 80% 80%,rgba(107,45,255,0.10) 0%,transparent 60%);transition:opacity 1.2s}
        .ambient.dim{opacity:0.25}
        .grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(45,111,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(45,111,255,0.025) 1px,transparent 1px);background-size:48px 48px}
        .topbar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:20px 32px}
        .logo{display:flex;align-items:center;gap:10px}
        .logo-icon{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .logo-text{font-size:15px;font-weight:700;letter-spacing:.02em}
        .logo-text span{color:var(--accent)}
        .status-pill{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);padding:6px 14px;border-radius:99px;font-size:12px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);transition:all .4s}
        .status-pill.live{background:rgba(45,111,255,0.1);border-color:rgba(45,111,255,0.3);color:#7aabff}
        .status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
        .status-pill.live .status-dot{animation:blink 1.4s ease-in-out infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
        .main{position:relative;z-index:5;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 24px}
        .visualizer{display:flex;align-items:flex-end;justify-content:center;gap:4px;height:48px;margin-bottom:28px}
        .bar{width:4px;border-radius:3px;background:linear-gradient(to top,var(--accent),var(--accent2));height:4px;opacity:.4;transition:opacity .4s}
        .visualizer.playing .bar{opacity:1}
        .visualizer.playing .bar:nth-child(1){animation:wave .85s ease-in-out infinite 0.00s}
        .visualizer.playing .bar:nth-child(2){animation:wave .85s ease-in-out infinite 0.07s}
        .visualizer.playing .bar:nth-child(3){animation:wave .85s ease-in-out infinite 0.14s}
        .visualizer.playing .bar:nth-child(4){animation:wave .85s ease-in-out infinite 0.21s}
        .visualizer.playing .bar:nth-child(5){animation:wave .85s ease-in-out infinite 0.28s}
        .visualizer.playing .bar:nth-child(6){animation:wave .85s ease-in-out infinite 0.35s}
        .visualizer.playing .bar:nth-child(7){animation:wave .85s ease-in-out infinite 0.42s}
        .visualizer.playing .bar:nth-child(8){animation:wave .85s ease-in-out infinite 0.35s}
        .visualizer.playing .bar:nth-child(9){animation:wave .85s ease-in-out infinite 0.28s}
        .visualizer.playing .bar:nth-child(10){animation:wave .85s ease-in-out infinite 0.21s}
        .visualizer.playing .bar:nth-child(11){animation:wave .85s ease-in-out infinite 0.14s}
        .visualizer.playing .bar:nth-child(12){animation:wave .85s ease-in-out infinite 0.07s}
        .visualizer.playing .bar:nth-child(13){animation:wave .85s ease-in-out infinite 0.00s}
        @keyframes wave{0%,100%{height:4px}50%{height:38px}}
        .hint{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:18px;opacity:0;transition:opacity .5s;display:flex;align-items:center;gap:6px}
        .hint.visible{opacity:1}
        .song-title{font-size:clamp(28px,5vw,52px);font-weight:800;line-height:1.1;text-align:center;letter-spacing:-.02em;max-width:820px;transition:opacity .3s;margin-bottom:14px;word-break:break-word}
        .station-label{font-size:12px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:40px}
        .btn-play{width:68px;height:68px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;display:flex;align-items:center;justify-content:center;transition:transform .18s,box-shadow .18s,opacity .3s;box-shadow:0 8px 32px rgba(45,111,255,0.45);-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none;margin-bottom:36px}
        .btn-play:active{transform:scale(.91)}
        @media(hover:hover){.btn-play:not(.offline):not(.loading):hover{transform:scale(1.08);box-shadow:0 14px 42px rgba(45,111,255,.6)}}
        .btn-play.offline{background:var(--dim);box-shadow:none;opacity:.35;cursor:default}
        .btn-play.loading{animation:pulse-btn 1s ease-in-out infinite}
        @keyframes pulse-btn{0%,100%{opacity:1}50%{opacity:.5}}
        .spin-icon{animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .volume-row{display:flex;align-items:center;gap:12px;width:100%;max-width:340px}
        .vol-icon{color:var(--muted);flex-shrink:0}
        input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:5px;background:var(--dim);border-radius:99px;outline:none;cursor:pointer;touch-action:pan-x}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);box-shadow:0 0 10px rgba(45,111,255,.55);margin-top:-8.5px}
        input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
        .vol-label{font-size:11px;color:var(--muted);min-width:34px;text-align:right}
        .footer{position:relative;z-index:10;display:flex;justify-content:center;padding:16px 24px 24px}
        .listener-pill{font-size:12px;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:6px 16px;border-radius:99px}
        audio{display:none}
    </style>
</head>
<body>
<div class="ambient" id="ambient"></div>
<div class="grid"></div>
<div class="topbar">
    <div class="logo">
        <div class="logo-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        </div>
        <div class="logo-text">MEHMET <span>SAM</span></div>
    </div>
    <div class="status-pill" id="statusPill">
        <div class="status-dot"></div>
        <span id="pillText">Bağlanıyor</span>
    </div>
</div>
<div class="main">
    <div class="visualizer" id="visualizer">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <div class="hint" id="hint"><span>▶</span><span>Butona Basarak Başlat</span></div>
    <div class="song-title" id="songTitle">—</div>
    <div class="station-label">Mehmet Sam Radyo</div>
    <button class="btn-play offline" id="playBtn" aria-label="Oynat / Durdur">
        <svg id="icoPlay" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
        <svg id="icoPause" style="display:none" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        <svg id="icoLoad" style="display:none" class="spin-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/><path d="M2 12h4"/><path d="M18 12h4"/><path d="M4.93 19.07l2.83-2.83"/><path d="M16.24 7.76l2.83-2.83"/>
        </svg>
    </button>
    <div class="volume-row">
        <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        <input type="range" id="volSlider" min="0" max="100" value="80">
        <span class="vol-label" id="volLabel">80%</span>
    </div>
</div>
<div class="footer"><div class="listener-pill" id="footerInfo">Yayın bekleniyor</div></div>

<script>
(() => {
'use strict';

const STATUS_URL = 'https://yo-yo-backing-paralyze.ngrok-free.dev/status';
const STREAM_URL = 'https://radyo-proxy.gower45651.workers.dev/stream';
const POLL_MS    = 3000;
const HDRS       = { 'ngrok-skip-browser-warning': '1', 'Cache-Control': 'no-cache' };

// ── DOM
const $pill      = document.getElementById('statusPill');
const $pillTxt   = document.getElementById('pillText');
const $playBtn   = document.getElementById('playBtn');
const $icoPlay   = document.getElementById('icoPlay');
const $icoPause  = document.getElementById('icoPause');
const $icoLoad   = document.getElementById('icoLoad');
const $viz       = document.getElementById('visualizer');
const $title     = document.getElementById('songTitle');
const $footer    = document.getElementById('footerInfo');
const $vol       = document.getElementById('volSlider');
const $volLbl    = document.getElementById('volLabel');
const $hint      = document.getElementById('hint');
const $ambient   = document.getElementById('ambient');

// ── App state
let broadcasting = false;
let wantsPlay    = false;
let playing      = false;
let loading      = false;
let currentSong  = '';
let currentStart = 0;
let vol          = 0.8;

// ── Dual-stream engine
// A ve B olmak üzere iki bağımsız slot.
// Her zaman birinde ses çalar, diğeri arka planda hazırlanır.
// Aktif slotun bağlantısı koparsa → diğeri hemen devreye girer.

const SLOT_COUNT = 2;
const slots = [makeSlot(0), makeSlot(1)];
let activeSlot = 0;   // şu an ses çıkaran slot
let standbySlot = 1;  // hazırlanan slot

function makeSlot(id) {
    return {
        id,
        audio:    null,   // Audio nesnesi
        mse:      null,
        sb:       null,
        abort:    null,
        reader:   null,
        ready:    false,  // ilk chunk geldi mi
        alive:    false,  // bağlantı açık mı
        objUrl:   null,
    };
}

// ── Volume
function applyVol() {
    vol = $vol.value / 100;
    $volLbl.textContent = $vol.value + '%';
    slots.forEach(s => { if (s.audio) s.audio.volume = (s.id === activeSlot) ? vol : 0; });
}
$vol.addEventListener('input',    applyVol);
$vol.addEventListener('change',   applyVol);
$vol.addEventListener('touchmove', applyVol, { passive: true });

// ── UI
function icon(n) {
    $icoPlay.style.display  = n==='play'  ? '' : 'none';
    $icoPause.style.display = n==='pause' ? '' : 'none';
    $icoLoad.style.display  = n==='load'  ? '' : 'none';
}
function updateUI() {
    icon(loading ? 'load' : playing ? 'pause' : 'play');
    $viz.classList.toggle('playing', playing);
    $playBtn.classList.toggle('loading', loading);
    $ambient.classList.toggle('dim', !playing);
    $hint.classList.toggle('visible', !playing && !loading && broadcasting);
}
function setBroadcast(on) {
    broadcasting = on;
    $pill.classList.toggle('live', on);
    $pillTxt.textContent = on ? 'BAĞLANDI' : 'Offline';
    $playBtn.classList.toggle('offline', !on);
    $playBtn.style.opacity = on ? '' : '0.35';
    updateUI();
}
function setTitle(t) {
    if (t === $title.textContent) return;
    $title.style.opacity = '0';
    setTimeout(() => { $title.textContent = t; $title.style.opacity = '1'; }, 200);
}

// ── Slot teardown
function killSlot(s) {
    s.alive = false;
    s.ready = false;
    if (s.abort) { s.abort.abort(); s.abort = null; }
    s.reader = null;
    if (s.audio) { s.audio.pause(); s.audio.src = ''; s.audio = null; }
    if (s.objUrl) { try { URL.revokeObjectURL(s.objUrl); } catch(_){} s.objUrl = null; }
    if (s.mse && s.mse.readyState === 'open') { try { s.mse.endOfStream(); } catch(_){} }
    s.mse = null; s.sb = null;
}

// ── Open a slot's stream connection
function openSlot(s, onReady) {
    killSlot(s);
    if (!window.MediaSource || !MediaSource.isTypeSupported('audio/mpeg')) {
        // Fallback: direkt <audio src>
        s.audio = new Audio();
        s.audio.volume = (s.id === activeSlot) ? vol : 0;
        s.audio.src = STREAM_URL + '?t=' + Date.now();
        s.audio.preload = 'auto';
        s.alive = true;
        s.audio.addEventListener('playing', () => { s.ready = true; if (onReady) onReady(s); }, { once: true });
        s.audio.addEventListener('error',   () => { if (wantsPlay) handleSlotError(s); });
        s.audio.play().catch(() => {});
        return;
    }

    s.mse   = new MediaSource();
    s.audio = new Audio();
    s.audio.volume = (s.id === activeSlot) ? vol : 0;
    s.objUrl = URL.createObjectURL(s.mse);
    s.audio.src = s.objUrl;
    s.alive = true;

    s.mse.addEventListener('sourceopen', async () => {
        try { s.sb = s.mse.addSourceBuffer('audio/mpeg'); }
        catch(e) { handleSlotError(s); return; }
        s.sb.mode = 'sequence';

        s.abort = new AbortController();
        let res;
        try {
            res = await fetch(STREAM_URL + '?t=' + Date.now(), {
                signal: s.abort.signal, headers: HDRS, cache: 'no-store'
            });
        } catch(e) {
            if (e.name !== 'AbortError') handleSlotError(s);
            return;
        }
        if (!res.ok) { handleSlotError(s); return; }

        s.reader = res.body.getReader();
        pumpSlot(s, onReady);
    }, { once: true });

    // Aktif slot ise oynat, standby ise beklet (sadece buffer doldur)
    if (s.id === activeSlot) {
        s.audio.play().catch(() => {});
    }
}

async function pumpSlot(s, onReady) {
    let chunkN = 0;
    try {
        while (true) {
            if (!s.alive || !s.sb || !s.mse || s.mse.readyState !== 'open') break;
            const { done, value } = await s.reader.read();
            if (done) {
                // Stream bitti → hemen yeniden aç
                if (wantsPlay && broadcasting) {
                    if (s.id === activeSlot) {
                        // Aktif slot kapandı → standby'ı devreye al
                        switchToStandby();
                    } else {
                        // Standby kapandı → yeniden aç
                        setTimeout(() => { if (wantsPlay && broadcasting) openSlot(s, null); }, 300);
                    }
                }
                return;
            }

            if (s.sb.updating) {
                await new Promise(r => s.sb.addEventListener('updateend', r, { once: true }));
            }
            if (!s.alive || !s.sb || !s.mse || s.mse.readyState !== 'open') break;

            try { s.sb.appendBuffer(value); }
            catch(e) {
                if (e.name === 'QuotaExceededError') { await trimSlot(s, true); try { s.sb.appendBuffer(value); } catch(_){} }
            }

            chunkN++;

            // İlk 3 chunk → slot hazır
            if (chunkN === 3 && !s.ready) {
                s.ready = true;
                if (onReady) onReady(s);
                // Standby slot ise ses sıfırda tut ama oynatmayı başlat (buffer için)
                if (s.id === standbySlot && s.audio && s.audio.paused) {
                    s.audio.volume = 0;
                    s.audio.play().catch(() => {});
                }
            }

            // Aktif slot: buffer'ı 4 sn'de tut (düşük gecikme)
            if (s.id === activeSlot && !s.sb.updating) trimSlot(s, false);
        }
    } catch(e) {
        if (e.name === 'AbortError') return;
        if (wantsPlay && broadcasting) handleSlotError(s);
    }
}

async function trimSlot(s, force) {
    if (!s.sb || s.sb.updating || !s.mse || s.mse.readyState !== 'open') return;
    if (!s.sb.buffered.length) return;
    const start = s.sb.buffered.start(0);
    const ct    = s.audio ? s.audio.currentTime : 0;
    const cut   = force ? ct - 1 : ct - 4;
    if (cut > start + 0.5) {
        try { s.sb.remove(start, cut); }
        catch(_){}
    }
}

function handleSlotError(s) {
    if (!wantsPlay || !broadcasting) return;
    if (s.id === activeSlot) {
        // Aktif slot hata → standby hazır mı?
        const sb = slots[standbySlot];
        if (sb.ready) {
            switchToStandby();
        } else {
            // Standby henüz hazır değil → kısa bekle, yeniden dene
            killSlot(s);
            setTimeout(() => { if (wantsPlay && broadcasting) openSlot(s, null); }, 200);
        }
    } else {
        // Standby hata → yeniden aç
        killSlot(s);
        setTimeout(() => { if (wantsPlay && broadcasting) openSlot(s, null); }, 500);
    }
}

// ── Ses kesintisiz geçiş: standby → active
function switchToStandby() {
    const prev = slots[activeSlot];
    const next = slots[standbySlot];

    if (!next.ready || !next.audio) {
        // Standby hazır değil → zorla yeniden bağlan
        killSlot(prev);
        openSlot(prev, null);
        return;
    }

    // Önceki slotu kapat
    killSlot(prev);

    // Yeni slotu aktif yap, ses aç
    activeSlot  = next.id;
    standbySlot = prev.id;
    next.audio.volume = vol;
    next.audio.play().catch(() => {});

    // Eski (şimdi standby) slotu yeniden hazırla
    const newStandby = slots[standbySlot];
    setTimeout(() => {
        if (wantsPlay && broadcasting) openSlot(newStandby, null);
    }, 500);
}

// ── Start / Stop
function startStreaming() {
    loading = true; playing = false; updateUI();

    activeSlot  = 0;
    standbySlot = 1;

    // Aktif slotu aç, hazır olunca playing yap
    openSlot(slots[0], (s) => {
        if (s.id !== activeSlot) return;
        // Aktif slot hazır → oynat
        if (s.audio && s.audio.paused) s.audio.play().catch(() => {});
        loading = false; playing = true; updateUI();
        // Standby'ı da aç
        setTimeout(() => {
            if (wantsPlay && broadcasting) openSlot(slots[1], null);
        }, 2000);
    });

    slots[0].audio && slots[0].audio.addEventListener('playing', () => {
        if (slots[0].id === activeSlot) { loading = false; playing = true; updateUI(); }
    }, { once: true });
}

function stopAll() {
    wantsPlay = false;
    slots.forEach(killSlot);
    loading = false; playing = false; updateUI();
}

// ── Audio event monitoring (aktif slot için)
function watchActiveSlot() {
    setInterval(() => {
        if (!wantsPlay || !playing) return;
        const s = slots[activeSlot];
        if (!s.audio) return;
        // readyState 0 veya 1 → ses durdu
        if (s.audio.readyState < 2 && !s.audio.paused) return; // yükleniyor olabilir
        if (s.audio.paused && playing) {
            // Ses durdu → standby devreye al
            const sb = slots[standbySlot];
            if (sb.ready) switchToStandby();
            else { loading = true; playing = false; updateUI(); openSlot(s, (ss) => { loading = false; playing = true; updateUI(); }); }
        }
    }, 300);
}

// ── Buton
let lastTap = 0;
function handleInteract(e) {
    e.preventDefault(); e.stopPropagation();
    const now = Date.now();
    if (now - lastTap < 300) return;
    lastTap = now;
    if (!broadcasting) return;
    if (playing || loading) { stopAll(); }
    else { wantsPlay = true; startStreaming(); }
}
$playBtn.addEventListener('click',    handleInteract);
$playBtn.addEventListener('touchend', handleInteract, { passive: false });

// ── Status polling
async function poll() {
    try {
        const ctrl = new AbortController();
        const tid  = setTimeout(() => ctrl.abort(), 4000);
        const res  = await fetch(STATUS_URL, { cache: 'no-store', signal: ctrl.signal, headers: HDRS });
        clearTimeout(tid);
        if (!res.ok) throw 0;
        const data = await res.json();

        const wasBroadcasting = broadcasting;
        setBroadcast(data.broadcasting);

        if (data.broadcasting) {
            if (data.song !== currentSong) {
                setTitle(data.song); currentSong = data.song;
                $footer.textContent = 'Canlı yayın';
            }
            const songChanged = currentStart && data.start_time && currentStart !== data.start_time;
            currentStart = data.start_time;
            if (songChanged && playing) {
                // Şarkı değişti → yeniden bağlan
                stopAll(); wantsPlay = true; startStreaming();
            }
            if (!wasBroadcasting && wantsPlay) startStreaming();
        } else {
            if (currentSong !== '—') { setTitle('—'); currentSong = '—'; }
            currentStart = 0;
            $footer.textContent = 'Yayın bekleniyor';
            if (playing || loading) stopAll();
        }
    } catch(e) {
        setBroadcast(false);
        setTitle('—'); currentSong = '—'; currentStart = 0;
        $footer.textContent = 'Bağlantı yok';
    }
}

document.addEventListener('visibilitychange', () => {
    if (document.hidden) return;
    poll();
    if (wantsPlay && broadcasting && !playing && !loading) startStreaming();
});
window.addEventListener('online',  () => { poll(); if (wantsPlay && broadcasting) startStreaming(); });
window.addEventListener('offline', () => setBroadcast(false));

watchActiveSlot();
poll();
setInterval(poll, POLL_MS);
})();
</script>
</body>
</html>
