<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050810">
    <title>Radyo</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #050810; --surface: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.07);
            --accent: #3d7fff; --accent2: #7c3dff; --red: #ff3d5a;
            --text: #f0f4ff; --muted: #3d4a60; --dim: #111827;
        }
        html, body { height: 100%; -webkit-text-size-adjust: 100%; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased; overflow: hidden;
        }
        .bg-blur {
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 60% 50% at 30% 80%, rgba(61,127,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 75% 20%, rgba(124,61,255,0.07) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ── TOP BAR ── */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 28px;
            border-bottom: 1px solid var(--border);
            background: rgba(5,8,16,0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .logo {
            display: flex; align-items: center; gap: 10px;
        }
        .logo-icon {
            width: 32px; height: 32px; border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .logo-icon svg { width: 16px; height: 16px; fill: white; }
        .logo-text {
            font-size: 15px; font-weight: 700; letter-spacing: 0.5px;
            color: var(--text);
        }
        .logo-text span { color: var(--accent); }
        .status-pill {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            padding: 6px 14px; border-radius: 99px;
            font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
            text-transform: uppercase; color: var(--muted);
            transition: all 0.4s;
        }
        .status-pill.live { border-color: rgba(255,61,90,0.25); color: var(--red); background: rgba(255,61,90,0.07); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .status-pill.live .status-dot { animation: blink 1.4s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        /* ── MAIN CONTENT ── */
        .main {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: relative; z-index: 1;
            padding: 100px 24px 140px;
            text-align: center;
        }

        /* ── VISUALIZER ── */
        .visualizer {
            display: flex; align-items: flex-end; justify-content: center;
            gap: 4px; height: 40px; margin-bottom: 28px;
        }
        .bar {
            width: 3px; border-radius: 2px;
            background: linear-gradient(180deg, var(--accent), var(--accent2));
            height: 3px; opacity: 0.5;
        }
        .visualizer.playing .bar { opacity: 1; }
        .visualizer.playing .bar:nth-child(1){animation:wave 0.85s ease-in-out infinite 0.00s}
        .visualizer.playing .bar:nth-child(2){animation:wave 0.85s ease-in-out infinite 0.07s}
        .visualizer.playing .bar:nth-child(3){animation:wave 0.85s ease-in-out infinite 0.14s}
        .visualizer.playing .bar:nth-child(4){animation:wave 0.85s ease-in-out infinite 0.21s}
        .visualizer.playing .bar:nth-child(5){animation:wave 0.85s ease-in-out infinite 0.28s}
        .visualizer.playing .bar:nth-child(6){animation:wave 0.85s ease-in-out infinite 0.35s}
        .visualizer.playing .bar:nth-child(7){animation:wave 0.85s ease-in-out infinite 0.28s}
        .visualizer.playing .bar:nth-child(8){animation:wave 0.85s ease-in-out infinite 0.21s}
        .visualizer.playing .bar:nth-child(9){animation:wave 0.85s ease-in-out infinite 0.14s}
        .visualizer.playing .bar:nth-child(10){animation:wave 0.85s ease-in-out infinite 0.07s}
        .visualizer.playing .bar:nth-child(11){animation:wave 0.85s ease-in-out infinite 0.00s}
        .visualizer.playing .bar:nth-child(12){animation:wave 0.85s ease-in-out infinite 0.07s}
        .visualizer.playing .bar:nth-child(13){animation:wave 0.85s ease-in-out infinite 0.14s}
        .visualizer.playing .bar:nth-child(14){animation:wave 0.85s ease-in-out infinite 0.21s}
        .visualizer.playing .bar:nth-child(15){animation:wave 0.85s ease-in-out infinite 0.28s}
        @keyframes wave { 0%,100%{height:3px} 50%{height:34px} }

        /* ── SONG META ── */
        .song-hint {
            font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
            color: var(--accent); margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px; justify-content: center;
        }
        .song-hint-icon { width: 12px; height: 12px; }
        .song-title {
            font-size: clamp(28px, 6vw, 64px);
            font-weight: 700;
            line-height: 1.15;
            color: var(--text);
            margin-bottom: 14px;
            max-width: 700px;
            transition: opacity 0.3s;
            word-break: break-word;
        }
        .station-label {
            font-size: 12px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
            color: var(--muted); margin-bottom: 40px;
        }

        /* ── CONTROLS ── */
        .controls-row {
            display: flex; flex-direction: column; align-items: center; gap: 24px;
        }
        .btn-play {
            width: 68px; height: 68px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s, opacity 0.2s;
            box-shadow: 0 0 0 8px rgba(61,127,255,0.1), 0 0 0 16px rgba(61,127,255,0.05);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none; -webkit-user-select: none;
        }
        .btn-play:active { transform: scale(0.93); }
        @media(hover:hover){ .btn-play:not(.offline):not(.loading):hover { transform:scale(1.07); box-shadow: 0 0 0 10px rgba(61,127,255,0.15), 0 0 0 20px rgba(61,127,255,0.07); } }
        .btn-play.offline { background: #1a2130; box-shadow: none; cursor: default; opacity: 0.4; }
        .btn-play.loading { animation: pulse-btn 1s ease-in-out infinite; }
        @keyframes pulse-btn { 0%,100%{opacity:1} 50%{opacity:0.45} }
        .spin-icon { animation: spin 1s linear infinite; }
        @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

        .song-status-text {
            font-size: 12px; color: var(--muted); letter-spacing: 0.5px;
        }

        /* ── VOLUME BAR ── */
        .vol-bar {
            display: flex; align-items: center; gap: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 99px;
            padding: 10px 20px;
        }
        .vol-icon { color: var(--muted); }
        input[type=range] {
            -webkit-appearance: none; appearance: none;
            width: 160px; height: 4px;
            background: rgba(255,255,255,0.08); border-radius: 99px;
            outline: none; cursor: pointer; touch-action: pan-x;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
            background: var(--accent); border: 2px solid rgba(5,8,16,0.8);
            box-shadow: 0 0 6px rgba(61,127,255,0.5); margin-top: -7px;
        }
        input[type=range]::-moz-range-thumb {
            width: 18px; height: 18px; border-radius: 50%;
            background: var(--accent); border: 2px solid rgba(5,8,16,0.8);
        }
        .vol-label { font-size: 12px; color: var(--muted); min-width: 36px; text-align: right; font-weight: 600; }

        /* ── BOTTOM BAR ── */
        .bottombar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            padding: 20px 28px;
            border-top: 1px solid var(--border);
            background: rgba(5,8,16,0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .listener-pill {
            font-size: 12px; color: var(--muted);
            background: var(--surface); border: 1px solid var(--border);
            padding: 6px 16px; border-radius: 99px; letter-spacing: 0.5px;
        }

        audio { display: none; }
    </style>
</head>
<body>
<div class="bg-blur"></div>

<!-- TOP BAR -->
<div class="topbar">
    <div class="logo">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 3a9 9 0 0 1 9 9 9 9 0 0 1-9 9A9 9 0 0 1 3 12 9 9 0 0 1 12 3zm0 4a5 5 0 1 0 0 10A5 5 0 0 0 12 7zm0 2a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/>
            </svg>
        </div>
        <span class="logo-text">MEHMET <span>SAM</span></span>
    </div>
    <div class="status-pill" id="liveBadge">
        <div class="status-dot"></div>
        <span id="liveText">Offline</span>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <div class="visualizer" id="visualizer">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <div class="song-hint" id="songHint">
        <svg class="song-hint-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <span id="songStatus">Bağlanılıyor...</span>
    </div>

    <div class="song-title" id="songTitle">—</div>
    <div class="station-label">MEHMET SAM RADYO</div>

    <div class="controls-row">
        <button class="btn-play offline" id="playBtn" aria-label="Oynat">
            <svg id="icoPlay" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
            <svg id="icoPause" style="display:none" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            <svg id="icoLoad" style="display:none" class="spin-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/>
                <path d="M2 12h4"/><path d="M18 12h4"/><path d="M4.93 19.07l2.83-2.83"/><path d="M16.24 7.76l2.83-2.83"/>
            </svg>
        </button>

        <div class="vol-bar">
            <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            </svg>
            <input type="range" id="volSlider" min="0" max="100" value="80">
            <span class="vol-label" id="volLabel">80%</span>
        </div>
    </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottombar">
    <div class="listener-pill" id="footerInfo">Yayın bekleniyor</div>
</div>

<audio id="audio" preload="none" playsinline webkit-playsinline x-webkit-airplay="allow"></audio>

<script>
(() => {
    'use strict';

    const API        = 'https://yo-yo-backing-paralyze.ngrok-free.dev';
    const API_STREAM = 'https://radyo-proxy.gower45651.workers.dev';
    const POLL_MS     = 3000;
    const MAX_RETRIES = 5;
    const RETRY_DELAYS = [1000, 2000, 3000, 5000, 8000];

    const NGROK_HEADERS = {
        'ngrok-skip-browser-warning': '1',
        'Cache-Control': 'no-cache'
    };

    const audio      = document.getElementById('audio');
    const playBtn    = document.getElementById('playBtn');
    const icoPlay    = document.getElementById('icoPlay');
    const icoPause   = document.getElementById('icoPause');
    const icoLoad    = document.getElementById('icoLoad');
    const visualizer = document.getElementById('visualizer');
    const songTitle  = document.getElementById('songTitle');
    const songHint   = document.getElementById('songHint');
    const songStatus = document.getElementById('songStatus');
    const liveBadge  = document.getElementById('liveBadge');
    const liveText   = document.getElementById('liveText');
    const footerInfo = document.getElementById('footerInfo');
    const volSlider  = document.getElementById('volSlider');
    const volLabel   = document.getElementById('volLabel');

    const ST = { IDLE: 'idle', LOADING: 'loading', PLAYING: 'playing' };
    let state          = ST.IDLE;
    let isBroadcasting = false;
    let currentSong    = '';
    let currentStart   = 0;
    let volume         = 0.8;
    let retryCount     = 0;
    let retryTimer     = null;
    let userWantsPlay  = false;
    let mse            = null;
    let sourceBuffer   = null;
    let fetchReader    = null;
    let fetchAbort     = null;

    audio.volume = volume;

    function updateVolume() {
        volume = volSlider.value / 100;
        audio.volume = volume;
        volLabel.textContent = volSlider.value + '%';
    }
    volSlider.addEventListener('input', updateVolume);
    volSlider.addEventListener('change', updateVolume);
    volSlider.addEventListener('touchmove', updateVolume, { passive: true });

    function showIcon(n) {
        icoPlay.style.display  = n==='play'  ? '' : 'none';
        icoPause.style.display = n==='pause' ? '' : 'none';
        icoLoad.style.display  = n==='load'  ? '' : 'none';
    }
    function setState(s) {
        state = s;
        const playing = s === ST.PLAYING;
        const loading = s === ST.LOADING;
        showIcon(loading ? 'load' : playing ? 'pause' : 'play');
        visualizer.classList.toggle('playing', playing);
        playBtn.classList.toggle('loading', loading);
    }
    function setBroadcast(on) {
        isBroadcasting = on;
        liveBadge.classList.toggle('live', on);
        liveText.textContent = on ? 'BAĞLANDI' : 'Offline';
        playBtn.classList.toggle('offline', !on);
        playBtn.style.opacity = on ? '' : '0.4';
    }
    function setTitle(t) {
        if (t === songTitle.textContent) return;
        songTitle.style.opacity = '0';
        setTimeout(() => { songTitle.textContent = t; songTitle.style.opacity = '1'; }, 250);
    }
    function setStatus(t) { songStatus.textContent = t; }

    function stopMSE() {
        if (fetchAbort) { fetchAbort.abort(); fetchAbort = null; }
        fetchReader = null;
        audio.pause();
        try { audio.src = ''; } catch(e) {}
        if (mse && mse.readyState === 'open') {
            try { mse.endOfStream(); } catch(e) {}
        }
        mse = null;
        sourceBuffer = null;
    }

    function startMSE() {
        stopMSE();
        setState(ST.LOADING);
        setStatus('Bağlanıyor...');

        if (!window.MediaSource) {
            startDirect();
            return;
        }

        mse = new MediaSource();
        audio.src = URL.createObjectURL(mse);
        audio.volume = volume;

        mse.addEventListener('sourceopen', async () => {
            try {
                sourceBuffer = mse.addSourceBuffer('audio/mpeg');
            } catch(e) {
                stopMSE();
                startDirect();
                return;
            }

            sourceBuffer.mode = 'sequence';

            fetchAbort = new AbortController();
            const url = API_STREAM + '/stream?t=' + Date.now();

            let response;
            try {
                response = await fetch(url, {
                    signal: fetchAbort.signal,
                    headers: NGROK_HEADERS
                });
            } catch(e) {
                if (e.name === 'AbortError') return;
                scheduleRetry();
                return;
            }

            if (!response.ok) {
                setStatus('Yayın yok');
                setState(ST.IDLE);
                return;
            }

            fetchReader = response.body.getReader();
            pumpStream();
        }, { once: true });

        audio.play().catch(() => {});
    }

    async function pumpStream() {
        if (!fetchReader || !sourceBuffer || !mse) return;

        try {
            while (true) {
                const { done, value } = await fetchReader.read();
                if (done) {
                    if (userWantsPlay && isBroadcasting) {
                        retryCount = 0;
                        setTimeout(startMSE, 1000);
                    } else {
                        setState(ST.IDLE);
                        setStatus('Yayın bitti');
                    }
                    break;
                }

                if (sourceBuffer.updating) {
                    await new Promise(r => sourceBuffer.addEventListener('updateend', r, { once: true }));
                }

                if (!sourceBuffer || !mse || mse.readyState !== 'open') break;

                try {
                    sourceBuffer.appendBuffer(value);
                } catch(e) {
                    if (e.name === 'QuotaExceededError' && sourceBuffer.buffered.length > 0) {
                        const start = sourceBuffer.buffered.start(0);
                        const end   = audio.currentTime - 5;
                        if (end > start) {
                            sourceBuffer.remove(start, end);
                            await new Promise(r => sourceBuffer.addEventListener('updateend', r, { once: true }));
                            try { sourceBuffer.appendBuffer(value); } catch(e2) {}
                        }
                    }
                }
            }
        } catch(e) {
            if (e.name === 'AbortError') return;
            if (userWantsPlay && isBroadcasting) scheduleRetry();
        }
    }

    function startDirect() {
        audio.src = API_STREAM + '/stream?t=' + Date.now();
        audio.volume = volume;
        audio.play().catch(() => scheduleRetry());
    }

    function scheduleRetry() {
        if (!userWantsPlay || !isBroadcasting) { setState(ST.IDLE); return; }
        if (retryCount >= MAX_RETRIES) {
            setState(ST.IDLE);
            setStatus('Bağlanamadı — tekrar dene');
            retryCount = 0;
            return;
        }
        const delay = RETRY_DELAYS[Math.min(retryCount, RETRY_DELAYS.length - 1)];
        setStatus(`Yeniden bağlanıyor... (${retryCount + 1}/${MAX_RETRIES})`);
        retryCount++;
        clearTimeout(retryTimer);
        retryTimer = setTimeout(startMSE, delay);
    }

    function stopPlay(reason) {
        userWantsPlay = false;
        clearTimeout(retryTimer);
        stopMSE();
        setState(ST.IDLE);
        setStatus(reason || 'Durduruldu');
        retryCount = 0;
    }

    let lastTap = 0;
    function handleInteract(e) {
        e.preventDefault();
        e.stopPropagation();
        const now = Date.now();
        if (now - lastTap < 350) return;
        lastTap = now;
        if (!isBroadcasting) return;
        if (state === ST.PLAYING || state === ST.LOADING) {
            stopPlay('Durduruldu');
        } else {
            userWantsPlay = true;
            retryCount = 0;
            startMSE();
        }
    }
    playBtn.addEventListener('click', handleInteract);
    playBtn.addEventListener('touchend', handleInteract, { passive: false });

    audio.addEventListener('playing', () => {
        clearTimeout(retryTimer);
        retryCount = 0;
        setState(ST.PLAYING);
        setStatus('Dinleniyor');
    });
    audio.addEventListener('waiting', () => {
        if (state === ST.PLAYING) setStatus('Tamponlanıyor...');
    });
    audio.addEventListener('error', () => {
        if (!userWantsPlay) return;
        scheduleRetry();
    });
    audio.addEventListener('ended', () => {
        if (userWantsPlay && isBroadcasting) {
            retryCount = 0;
            setTimeout(startMSE, 1000);
        } else {
            setState(ST.IDLE);
            setStatus('Yayın bitti');
        }
    });

    async function checkStatus() {
        try {
            const ctrl = new AbortController();
            const tid = setTimeout(() => ctrl.abort(), 5000);
            const res = await fetch(API + '/status', {
                cache: 'no-store',
                signal: ctrl.signal,
                headers: NGROK_HEADERS
            });
            clearTimeout(tid);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();

            const wasBroadcasting = isBroadcasting;
            setBroadcast(data.broadcasting);

            if (data.broadcasting) {
                if (data.song !== currentSong) {
                    setTitle(data.song);
                    currentSong = data.song;
                    footerInfo.textContent = 'Canlı yayın';
                }
                const songChanged = currentStart && data.start_time && currentStart !== data.start_time;
                currentStart = data.start_time;

                if (songChanged && state === ST.PLAYING) {
                    retryCount = 0;
                    startMSE();
                }
                if (!wasBroadcasting) {
                    setStatus('Yayın başladı — ▶ bas');
                    if (userWantsPlay) { retryCount = 0; startMSE(); }
                }
            } else {
                if (currentSong !== '—') { setTitle('—'); currentSong = '—'; }
                currentStart = 0;
                footerInfo.textContent = 'Yayın bekleniyor';
                if (state !== ST.IDLE) stopPlay('Şuan yayın yapılmıyor');
                else setStatus('Şuan yayın yapılmıyor');
            }
        } catch(e) {
            setBroadcast(false);
            setTitle('—'); currentSong = '—'; currentStart = 0;
            footerInfo.textContent = 'Bağlantı yok';
            setStatus('Sunucuya ulaşılamıyor');
            if (state !== ST.IDLE) setState(ST.IDLE);
        }
    }

    document.addEventListener('visibilitychange', () => {
        if (document.hidden) return;
        checkStatus();
        if (userWantsPlay && isBroadcasting && state === ST.IDLE) {
            retryCount = 0; startMSE();
        }
    });

    window.addEventListener('online', () => {
        checkStatus();
        if (userWantsPlay && isBroadcasting) { retryCount = 0; startMSE(); }
    });
    window.addEventListener('offline', () => {
        setBroadcast(false);
        setStatus('İnternet bağlantısı yok');
    });

    checkStatus();
    setInterval(checkStatus, POLL_MS);
})();
</script>
</body>
</html>
