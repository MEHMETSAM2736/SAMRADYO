<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#060810">
    <title>Mehmet Sam Radyo</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #060810;
            --accent: #2d6fff;
            --accent2: #6b2dff;
            --red: #ff3d5a;
            --text: #e8edf5;
            --muted: #4a5568;
            --dim: #111827;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.07);
        }
        html, body {
            height: 100%; width: 100%;
            -webkit-text-size-adjust: 100%;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient background glow */
        .ambient {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 60% 50% at 50% -10%, rgba(45,111,255,0.18) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 80%, rgba(107,45,255,0.10) 0%, transparent 60%);
            transition: opacity 1.2s;
        }
        .ambient.dim { opacity: 0.3; }

        /* Grid overlay */
        .grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(45,111,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(45,111,255,0.025) 1px, transparent 1px);
            background-size: 48px 48px;
        }

        /* ── TOPBAR ── */
        .topbar {
            position: relative; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 32px;
        }
        .logo {
            display: flex; align-items: center; gap: 10px;
        }
        .logo-icon {
            width: 34px; height: 34px; border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .logo-icon svg { display: block; }
        .logo-text {
            font-size: 15px; font-weight: 700; letter-spacing: 0.02em;
        }
        .logo-text span { color: var(--accent); }

        .status-pill {
            display: flex; align-items: center; gap: 7px;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 6px 14px; border-radius: 99px;
            font-size: 12px; font-weight: 600;
            letter-spacing: 1.2px; text-transform: uppercase;
            color: var(--muted);
            transition: all 0.4s;
        }
        .status-pill.live {
            background: rgba(45,111,255,0.1);
            border-color: rgba(45,111,255,0.3);
            color: #7aabff;
        }
        .status-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: currentColor; flex-shrink: 0;
        }
        .status-pill.live .status-dot {
            animation: blink 1.4s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

        /* ── MAIN ── */
        .main {
            position: relative; z-index: 5;
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px 24px;
            gap: 0;
        }

        /* Visualizer */
        .visualizer {
            display: flex; align-items: flex-end; justify-content: center;
            gap: 4px; height: 48px; margin-bottom: 28px;
        }
        .bar {
            width: 4px; border-radius: 3px;
            background: linear-gradient(to top, var(--accent), var(--accent2));
            height: 4px; opacity: 0.5;
            transition: opacity 0.4s;
        }
        .visualizer.playing .bar { opacity: 1; }
        .visualizer.playing .bar:nth-child(1)  { animation: wave 0.85s ease-in-out infinite 0.00s }
        .visualizer.playing .bar:nth-child(2)  { animation: wave 0.85s ease-in-out infinite 0.07s }
        .visualizer.playing .bar:nth-child(3)  { animation: wave 0.85s ease-in-out infinite 0.14s }
        .visualizer.playing .bar:nth-child(4)  { animation: wave 0.85s ease-in-out infinite 0.21s }
        .visualizer.playing .bar:nth-child(5)  { animation: wave 0.85s ease-in-out infinite 0.28s }
        .visualizer.playing .bar:nth-child(6)  { animation: wave 0.85s ease-in-out infinite 0.35s }
        .visualizer.playing .bar:nth-child(7)  { animation: wave 0.85s ease-in-out infinite 0.42s }
        .visualizer.playing .bar:nth-child(8)  { animation: wave 0.85s ease-in-out infinite 0.35s }
        .visualizer.playing .bar:nth-child(9)  { animation: wave 0.85s ease-in-out infinite 0.28s }
        .visualizer.playing .bar:nth-child(10) { animation: wave 0.85s ease-in-out infinite 0.21s }
        .visualizer.playing .bar:nth-child(11) { animation: wave 0.85s ease-in-out infinite 0.14s }
        .visualizer.playing .bar:nth-child(12) { animation: wave 0.85s ease-in-out infinite 0.07s }
        .visualizer.playing .bar:nth-child(13) { animation: wave 0.85s ease-in-out infinite 0.00s }
        @keyframes wave { 0%,100%{height:4px} 50%{height:38px} }

        /* Hint text */
        .hint {
            font-size: 11px; font-weight: 600; letter-spacing: 2px;
            text-transform: uppercase; color: var(--accent);
            margin-bottom: 18px; opacity: 0;
            transition: opacity 0.5s;
            display: flex; align-items: center; gap: 6px;
        }
        .hint.visible { opacity: 1; }
        .hint-arrow { font-size: 9px; }

        /* Song title */
        .song-title {
            font-size: clamp(28px, 5vw, 52px);
            font-weight: 800;
            line-height: 1.1;
            text-align: center;
            letter-spacing: -0.02em;
            max-width: 820px;
            transition: opacity 0.3s;
            margin-bottom: 14px;
            word-break: break-word;
        }

        /* Station label */
        .station-label {
            font-size: 12px; font-weight: 500;
            letter-spacing: 3px; text-transform: uppercase;
            color: var(--muted); margin-bottom: 40px;
        }

        /* Play button */
        .btn-play {
            width: 68px; height: 68px; border-radius: 50%;
            border: none; cursor: pointer;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.18s, box-shadow 0.18s, opacity 0.3s;
            box-shadow: 0 8px 32px rgba(45,111,255,0.45);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none; -webkit-user-select: none;
            margin-bottom: 36px;
        }
        .btn-play:active { transform: scale(0.91); }
        @media(hover:hover) {
            .btn-play:not(.offline):not(.loading):hover {
                transform: scale(1.08);
                box-shadow: 0 14px 42px rgba(45,111,255,0.6);
            }
        }
        .btn-play.offline { background: var(--dim); box-shadow: none; opacity: 0.35; cursor: default; }
        .btn-play.loading { animation: pulse-btn 1s ease-in-out infinite; }
        @keyframes pulse-btn { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .spin-icon { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Volume row */
        .volume-row {
            display: flex; align-items: center; gap: 12px;
            width: 100%; max-width: 340px;
        }
        .vol-icon { color: var(--muted); flex-shrink: 0; }
        input[type=range] {
            -webkit-appearance: none; appearance: none;
            flex: 1; height: 5px;
            background: var(--dim); border-radius: 99px;
            outline: none; cursor: pointer;
            touch-action: pan-x;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 22px; height: 22px; border-radius: 50%;
            background: var(--accent);
            border: 2px solid var(--bg);
            box-shadow: 0 0 10px rgba(45,111,255,0.55);
            margin-top: -8.5px;
        }
        input[type=range]::-moz-range-thumb {
            width: 22px; height: 22px; border-radius: 50%;
            background: var(--accent); border: 2px solid var(--bg);
        }
        .vol-label {
            font-size: 11px; color: var(--muted); min-width: 34px; text-align: right;
        }

        /* ── FOOTER ── */
        .footer {
            position: relative; z-index: 10;
            display: flex; justify-content: center;
            padding: 16px 24px 24px;
        }
        .listener-pill {
            font-size: 12px; color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 6px 16px; border-radius: 99px;
        }

        /* Status text below title */
        .song-status {
            font-size: 12px; color: var(--muted);
            margin-bottom: 0; margin-top: -8px;
            min-height: 18px; margin-bottom: 32px;
            transition: opacity 0.3s;
        }
        .song-status.buffering { color: #f59e0b; }

        audio { display: none; }

        @media (max-width: 480px) {
            .topbar { padding: 16px 20px; }
            .song-title { font-size: clamp(22px, 7vw, 36px); }
        }
    </style>
</head>
<body>
<div class="ambient" id="ambient"></div>
<div class="grid"></div>

<!-- Topbar -->
<div class="topbar">
    <div class="logo">
        <div class="logo-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
                <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
            </svg>
        </div>
        <div class="logo-text">MEHMET <span>SAM</span></div>
    </div>
    <div class="status-pill" id="statusPill">
        <div class="status-dot"></div>
        <span id="pillText">Bağlanıyor</span>
    </div>
</div>

<!-- Main -->
<div class="main">
    <div class="visualizer" id="visualizer">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div>
    </div>

    <div class="hint" id="hint">
        <span class="hint-arrow">▶</span>
        <span>Butona Basarak Başlat</span>
    </div>

    <div class="song-title" id="songTitle">—</div>
    <div class="station-label">Mehmet Sam Radyo</div>

    <button class="btn-play offline" id="playBtn" aria-label="Oynat / Durdur">
        <svg id="icoPlay" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
        <svg id="icoPause" style="display:none" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        <svg id="icoLoad" style="display:none" class="spin-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 2v4"/><path d="M12 18v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/>
            <path d="M2 12h4"/><path d="M18 12h4"/><path d="M4.93 19.07l2.83-2.83"/><path d="M16.24 7.76l2.83-2.83"/>
        </svg>
    </button>

    <div class="song-status" id="songStatus"></div>

    <div class="volume-row">
        <svg class="vol-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
        <input type="range" id="volSlider" min="0" max="100" value="80">
        <span class="vol-label" id="volLabel">80%</span>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    <div class="listener-pill" id="footerInfo">Yayın bekleniyor</div>
</div>

<audio id="audio" preload="none" playsinline webkit-playsinline x-webkit-airplay="allow"></audio>

<script>
(() => {
    'use strict';

    const API        = 'https://yo-yo-backing-paralyze.ngrok-free.dev';
    const API_STREAM = 'https://radyo-proxy.gower45651.workers.dev';
    const POLL_MS    = 3000;
    const MAX_RETRIES = 8;
    const RETRY_DELAYS = [500, 1000, 1500, 2000, 3000, 4000, 6000, 8000];

    const NGROK_HEADERS = {
        'ngrok-skip-browser-warning': '1',
        'Cache-Control': 'no-cache'
    };

    const audio      = document.getElementById('audio');
    const playBtn    = document.getElementById('playBtn');
    const icoPlay    = document.getElementById('icoPlay');
    const icoPause   = document.getElementById('icoPause');
    const icoLoad    = document.getElementById('icoLoad');
    const visualizer = document.getElementById('visualizer');
    const songTitle  = document.getElementById('songTitle');
    const songStatus = document.getElementById('songStatus');
    const statusPill = document.getElementById('statusPill');
    const pillText   = document.getElementById('pillText');
    const footerInfo = document.getElementById('footerInfo');
    const volSlider  = document.getElementById('volSlider');
    const volLabel   = document.getElementById('volLabel');
    const hint       = document.getElementById('hint');
    const ambient    = document.getElementById('ambient');

    const ST = { IDLE: 'idle', LOADING: 'loading', PLAYING: 'playing' };
    let state          = ST.IDLE;
    let isBroadcasting = false;
    let currentSong    = '';
    let currentStart   = 0;
    let volume         = 0.8;
    let retryCount     = 0;
    let retryTimer     = null;
    let userWantsPlay  = false;
    let mse            = null;
    let sourceBuffer   = null;
    let fetchReader    = null;
    let fetchAbort     = null;

    // ── Warmup audio: yedek audio düğümü (kesintisiz geçiş için)
    let warmupAudio    = null;
    let warmupAbort    = null;
    let warmupReader   = null;
    let warmupMse      = null;
    let warmupSb       = null;
    let warmupReady    = false;
    const WARMUP_AFTER_MS = 20000; // 20 sn sonra yedek bağlantı kur
    let warmupTimer    = null;

    audio.volume = volume;

    function updateVolume() {
        volume = volSlider.value / 100;
        audio.volume = volume;
        if (warmupAudio) warmupAudio.volume = volume;
        volLabel.textContent = volSlider.value + '%';
    }
    volSlider.addEventListener('input', updateVolume);
    volSlider.addEventListener('change', updateVolume);
    volSlider.addEventListener('touchmove', updateVolume, { passive: true });

    /* ── UI ── */
    function showIcon(n) {
        icoPlay.style.display  = n === 'play'  ? '' : 'none';
        icoPause.style.display = n === 'pause' ? '' : 'none';
        icoLoad.style.display  = n === 'load'  ? '' : 'none';
    }
    function setState(s) {
        state = s;
        const playing = s === ST.PLAYING;
        const loading = s === ST.LOADING;
        showIcon(loading ? 'load' : playing ? 'pause' : 'play');
        visualizer.classList.toggle('playing', playing);
        playBtn.classList.toggle('loading', loading);
        ambient.classList.toggle('dim', !playing);
        hint.classList.toggle('visible', s === ST.IDLE && isBroadcasting);
    }
    function setBroadcast(on) {
        isBroadcasting = on;
        statusPill.classList.toggle('live', on);
        pillText.textContent = on ? 'BAĞLANDI' : 'Offline';
        playBtn.classList.toggle('offline', !on);
        playBtn.style.opacity = on ? '' : '0.35';
        hint.classList.toggle('visible', on && state === ST.IDLE);
    }
    function setTitle(t) {
        if (t === songTitle.textContent) return;
        songTitle.style.opacity = '0';
        setTimeout(() => { songTitle.textContent = t; songTitle.style.opacity = '1'; }, 250);
    }
    function setStatus(t, type) {
        songStatus.textContent = t;
        songStatus.className = 'song-status' + (type ? ' ' + type : '');
    }

    /* ── MSE Stream ── */
    function stopMSE(keepWarmup) {
        if (fetchAbort) { fetchAbort.abort(); fetchAbort = null; }
        fetchReader = null;
        audio.pause();
        try { audio.src = ''; } catch(e) {}
        if (mse && mse.readyState === 'open') {
            try { mse.endOfStream(); } catch(e) {}
        }
        mse = null;
        sourceBuffer = null;
        if (!keepWarmup) stopWarmup();
    }

    function startMSE() {
        stopMSE(true);
        setState(ST.LOADING);
        setStatus('Bağlanıyor...');

        if (!window.MediaSource) {
            startDirect();
            return;
        }

        mse = new MediaSource();
        audio.src = URL.createObjectURL(mse);
        audio.volume = volume;

        mse.addEventListener('sourceopen', async () => {
            try {
                sourceBuffer = mse.addSourceBuffer('audio/mpeg');
            } catch(e) {
                stopMSE(true);
                startDirect();
                return;
            }
            sourceBuffer.mode = 'sequence';

            fetchAbort = new AbortController();
            const url = API_STREAM + '/stream?t=' + Date.now();

            let response;
            try {
                response = await fetch(url, {
                    signal: fetchAbort.signal,
                    headers: NGROK_HEADERS
                });
            } catch(e) {
                if (e.name === 'AbortError') return;
                scheduleRetry();
                return;
            }

            if (!response.ok) {
                setStatus('Yayın yok');
                setState(ST.IDLE);
                return;
            }

            fetchReader = response.body.getReader();
            pumpStream();
        }, { once: true });

        audio.play().catch(() => {});
    }

    async function pumpStream() {
        if (!fetchReader || !sourceBuffer || !mse) return;
        try {
            while (true) {
                const { done, value } = await fetchReader.read();
                if (done) {
                    if (userWantsPlay && isBroadcasting) {
                        retryCount = 0;
                        // Warmup hazır mı? Sessizce geç
                        if (warmupReady && warmupAudio) {
                            seamlessSwitch();
                        } else {
                            setTimeout(startMSE, 300);
                        }
                    } else {
                        setState(ST.IDLE);
                        setStatus('Yayın bitti');
                    }
                    break;
                }

                if (sourceBuffer.updating) {
                    await new Promise(r => sourceBuffer.addEventListener('updateend', r, { once: true }));
                }
                if (!sourceBuffer || !mse || mse.readyState !== 'open') break;

                try {
                    sourceBuffer.appendBuffer(value);
                    // Buffer çok dolmasın, eski kısımları sil
                    trimBuffer();
                } catch(e) {
                    if (e.name === 'QuotaExceededError') {
                        await forceFlushBuffer();
                        try { sourceBuffer.appendBuffer(value); } catch(e2) {}
                    }
                }
            }
        } catch(e) {
            if (e.name === 'AbortError') return;
            if (userWantsPlay && isBroadcasting) {
                if (warmupReady && warmupAudio) {
                    seamlessSwitch();
                } else {
                    scheduleRetry();
                }
            }
        }
    }

    function trimBuffer() {
        if (!sourceBuffer || sourceBuffer.updating || !mse || mse.readyState !== 'open') return;
        if (sourceBuffer.buffered.length === 0) return;
        const behind = audio.currentTime - 10; // 10 saniye öncesini tut
        const start  = sourceBuffer.buffered.start(0);
        if (behind > start + 1) {
            try { sourceBuffer.remove(start, behind); } catch(e) {}
        }
    }

    async function forceFlushBuffer() {
        if (!sourceBuffer || !mse || mse.readyState !== 'open') return;
        if (sourceBuffer.buffered.length === 0) return;
        const start = sourceBuffer.buffered.start(0);
        const end   = audio.currentTime - 5;
        if (end > start) {
            try {
                sourceBuffer.remove(start, end);
                await new Promise(r => sourceBuffer.addEventListener('updateend', r, { once: true }));
            } catch(e) {}
        }
    }

    /* Fallback: direkt audio src */
    function startDirect() {
        audio.src = API_STREAM + '/stream?t=' + Date.now();
        audio.volume = volume;
        audio.play().catch(() => scheduleRetry());
    }

    /* ── WARMUP (yedek bağlantı) ── */
    // Kullanıcı dinlerken arka planda ikinci bir bağlantı açılır.
    // Kesinti olursa bu hazır bağlantıya sessizce geçilir.
    function stopWarmup() {
        clearTimeout(warmupTimer);
        if (warmupAbort) { warmupAbort.abort(); warmupAbort = null; }
        warmupReader = null;
        if (warmupAudio) {
            warmupAudio.pause();
            try { warmupAudio.src = ''; } catch(e) {}
            warmupAudio = null;
        }
        if (warmupMse && warmupMse.readyState === 'open') {
            try { warmupMse.endOfStream(); } catch(e) {}
        }
        warmupMse = null;
        warmupSb = null;
        warmupReady = false;
    }

    function scheduleWarmup() {
        stopWarmup();
        warmupTimer = setTimeout(initWarmup, WARMUP_AFTER_MS);
    }

    async function initWarmup() {
        if (!userWantsPlay || !isBroadcasting || !window.MediaSource) return;
        warmupReady = false;

        warmupAudio = new Audio();
        warmupAudio.volume = 0; // sessiz
        warmupAudio.preload = 'none';

        warmupMse = new MediaSource();
        warmupAudio.src = URL.createObjectURL(warmupMse);

        warmupMse.addEventListener('sourceopen', async () => {
            try {
                warmupSb = warmupMse.addSourceBuffer('audio/mpeg');
            } catch(e) { stopWarmup(); return; }
            warmupSb.mode = 'sequence';

            warmupAbort = new AbortController();
            const url = API_STREAM + '/stream?t=' + Date.now();

            let response;
            try {
                response = await fetch(url, {
                    signal: warmupAbort.signal,
                    headers: NGROK_HEADERS
                });
            } catch(e) { if (e.name !== 'AbortError') stopWarmup(); return; }

            if (!response.ok) { stopWarmup(); return; }

            warmupReader = response.body.getReader();
            pumpWarmup();
        }, { once: true });

        warmupAudio.play().catch(() => {}); // buffer doldurmak için başlat
    }

    async function pumpWarmup() {
        if (!warmupReader || !warmupSb || !warmupMse) return;
        let chunkCount = 0;
        try {
            while (true) {
                const { done, value } = await warmupReader.read();
                if (done) { stopWarmup(); break; }
                if (warmupSb.updating) {
                    await new Promise(r => warmupSb.addEventListener('updateend', r, { once: true }));
                }
                if (!warmupSb || !warmupMse || warmupMse.readyState !== 'open') break;
                try { warmupSb.appendBuffer(value); } catch(e) {}
                chunkCount++;
                if (chunkCount === 5) warmupReady = true; // 5 chunk sonra hazır say
            }
        } catch(e) {
            if (e.name !== 'AbortError') stopWarmup();
        }
    }

    /* Ana audio'dan warmup'a sessiz geçiş */
    function seamlessSwitch() {
        if (!warmupAudio || !warmupReady) {
            scheduleRetry();
            return;
        }
        // warmup'ı ana audio yap
        const oldAudio = audio;
        // warmup ses seviyesini çıkar
        warmupAudio.volume = volume;
        // warmup'ı "ana" olarak kullan (doğrudan play)
        warmupAudio.play().catch(() => {});

        // Eski stream'i durdur
        if (fetchAbort) { fetchAbort.abort(); fetchAbort = null; }
        oldAudio.pause();
        try { oldAudio.src = ''; } catch(e) {}

        // warmup'ı ana audio element'e "transfer" edemeyiz,
        // ama warmup yeterince bufferlıysa devam eder.
        // Yeni warmup scheduleı başlat
        warmupReady = false;
        const prevWarmupAudio = warmupAudio;
        warmupAudio = null;
        warmupMse = null;
        warmupSb = null;

        // Yeni ana olarak yeniden bağlan; aynı anda warmup da başlatılacak
        retryCount = 0;
        setTimeout(startMSE, 100);

        // Geçiş sırasında ses için prevWarmupAudio biraz süre çalar
        setTimeout(() => { prevWarmupAudio.pause(); }, 3000);
    }

    function scheduleRetry() {
        if (!userWantsPlay || !isBroadcasting) { setState(ST.IDLE); return; }
        if (retryCount >= MAX_RETRIES) {
            setState(ST.IDLE);
            setStatus('Bağlanamadı — tekrar dene');
            retryCount = 0;
            return;
        }
        const delay = RETRY_DELAYS[Math.min(retryCount, RETRY_DELAYS.length - 1)];
        // Kullanıcıya tamponlanıyor değil, sadece sessizce yeniden bağlan
        retryCount++;
        clearTimeout(retryTimer);
        retryTimer = setTimeout(startMSE, delay);
    }

    function stopPlay(reason) {
        userWantsPlay = false;
        clearTimeout(retryTimer);
        stopMSE();
        stopWarmup();
        setState(ST.IDLE);
        setStatus(reason || '');
        retryCount = 0;
    }

    /* ── Buton ── */
    let lastTap = 0;
    function handleInteract(e) {
        e.preventDefault();
        e.stopPropagation();
        const now = Date.now();
        if (now - lastTap < 350) return;
        lastTap = now;
        if (!isBroadcasting) return;
        if (state === ST.PLAYING || state === ST.LOADING) {
            stopPlay('');
        } else {
            userWantsPlay = true;
            retryCount = 0;
            startMSE();
        }
    }
    playBtn.addEventListener('click', handleInteract);
    playBtn.addEventListener('touchend', handleInteract, { passive: false });

    /* ── Audio events ── */
    audio.addEventListener('playing', () => {
        clearTimeout(retryTimer);
        retryCount = 0;
        setState(ST.PLAYING);
        setStatus('');
        // Warmup'ı zamanla başlat
        scheduleWarmup();
    });
    audio.addEventListener('waiting', () => {
        // Tamponlama durumunda kullanıcıya gösterme, arka planda çöz
        if (state === ST.PLAYING) {
            // Sessizce yeniden bağlanmayı dene
            if (userWantsPlay && isBroadcasting) {
                setTimeout(() => {
                    // Hala waiting durumundaysa yeniden bağlan
                    if (audio.readyState < 3 && userWantsPlay) {
                        retryCount = 0;
                        startMSE();
                    }
                }, 1500);
            }
        }
    });
    audio.addEventListener('error', () => {
        if (!userWantsPlay) return;
        scheduleRetry();
    });
    audio.addEventListener('ended', () => {
        if (userWantsPlay && isBroadcasting) {
            retryCount = 0;
            setTimeout(startMSE, 300);
        } else {
            setState(ST.IDLE);
            setStatus('');
        }
    });
    audio.addEventListener('stalled', () => {
        if (!userWantsPlay || !isBroadcasting) return;
        setTimeout(() => {
            if (audio.readyState < 3 && userWantsPlay) {
                retryCount = 0;
                startMSE();
            }
        }, 2000);
    });

    /* ── Durum sorgulama ── */
    async function checkStatus() {
        try {
            const ctrl = new AbortController();
            const tid = setTimeout(() => ctrl.abort(), 5000);
            const res = await fetch(API + '/status', {
                cache: 'no-store',
                signal: ctrl.signal,
                headers: NGROK_HEADERS
            });
            clearTimeout(tid);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();

            const wasBroadcasting = isBroadcasting;
            setBroadcast(data.broadcasting);

            if (data.broadcasting) {
                if (data.song !== currentSong) {
                    setTitle(data.song);
                    currentSong = data.song;
                    footerInfo.textContent = 'Canlı yayın';
                }
                const songChanged = currentStart && data.start_time && currentStart !== data.start_time;
                currentStart = data.start_time;

                if (songChanged && state === ST.PLAYING) {
                    retryCount = 0;
                    stopWarmup();
                    startMSE();
                }
                if (!wasBroadcasting) {
                    setStatus('Yayın başladı');
                    if (userWantsPlay) { retryCount = 0; startMSE(); }
                }
            } else {
                if (currentSong !== '—') { setTitle('—'); currentSong = '—'; }
                currentStart = 0;
                footerInfo.textContent = 'Yayın bekleniyor';
                if (state !== ST.IDLE) stopPlay('');
                else setStatus('');
            }
        } catch(e) {
            setBroadcast(false);
            setTitle('—'); currentSong = '—'; currentStart = 0;
            footerInfo.textContent = 'Bağlantı yok';
            setStatus('Sunucuya ulaşılamıyor');
            if (state !== ST.IDLE) setState(ST.IDLE);
        }
    }

    /* ── Sayfa görünürlüğü ── */
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) return;
        checkStatus();
        if (userWantsPlay && isBroadcasting && state === ST.IDLE) {
            retryCount = 0; startMSE();
        }
    });
    window.addEventListener('online', () => {
        checkStatus();
        if (userWantsPlay && isBroadcasting) { retryCount = 0; startMSE(); }
    });
    window.addEventListener('offline', () => {
        setBroadcast(false);
        setStatus('İnternet bağlantısı yok');
    });

    checkStatus();
    setInterval(checkStatus, POLL_MS);
})();
</script>
</body>
</html>
