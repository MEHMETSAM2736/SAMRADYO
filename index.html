<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Okul Radyosu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Segoe UI',Arial,sans-serif;
background:linear-gradient(135deg,#0c0c1d 0%,#1a1a3e 50%,#0c0c1d 100%);
color:#fff;min-height:100vh;
display:flex;align-items:center;justify-content:center;padding:20px
}
.container{width:100%;max-width:480px;text-align:center}
.header{margin-bottom:40px}
.header h1{
font-size:34px;font-weight:800;
background:linear-gradient(135deg,#ff6b6b,#ffa94d);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px
}
.header p{color:#666;font-size:12px;margin-top:6px;letter-spacing:3px;text-transform:uppercase}
.status-line{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:30px;font-size:13px;color:#888}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot.off{background:#555}
.dot.on{background:#51cf66;box-shadow:0 0 8px rgba(81,207,102,0.5);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.song-area{margin-bottom:25px;min-height:80px}
.label{color:#555;font-size:11px;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
.song-name{font-size:30px;font-weight:700;word-break:break-word;line-height:1.3}
.live-badge{
display:none;background:#e03131;color:#fff;
font-size:10px;font-weight:700;padding:4px 14px;border-radius:20px;
letter-spacing:1.5px;margin-top:10px
}
.live-badge.on{display:inline-block}
.connect-btn{
background:linear-gradient(135deg,#ff6b6b,#ee5a24);
border:none;color:#fff;font-size:18px;font-weight:700;
padding:14px 48px;border-radius:50px;cursor:pointer;
transition:all .3s;letter-spacing:2px;margin:20px 0
}
.connect-btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(255,107,107,0.3)}
.connect-btn:active{transform:scale(0.97)}
.volume-wrap{display:none;align-items:center;justify-content:center;gap:14px;margin:20px 0}
.volume-wrap.on{display:flex}
.volume-wrap .icon{font-size:20px;color:#888;width:24px;text-align:center}
.volume-wrap input[type=range]{
width:200px;height:4px;-webkit-appearance:none;
background:rgba(255,255,255,0.15);border-radius:4px;outline:none
}
.volume-wrap input[type=range]::-webkit-slider-thumb{
-webkit-appearance:none;width:18px;height:18px;border-radius:50%;
background:#ff6b6b;cursor:pointer;border:2px solid #fff
}
.waiting-area{color:#666;font-size:16px;margin:30px 0}
.waiting-area .icon{font-size:44px;margin-bottom:12px}
.footer{color:#333;font-size:11px;margin-top:30px;letter-spacing:1px}
@media(max-width:480px){.song-name{font-size:24px}.volume-wrap input[type=range]{width:160px}}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>OKUL RADYOSU</h1>
<p>Canli Yayin</p>
</div>

<div class="status-line">
<span class="dot off" id="dot"></span>
<span id="statusText">Baglanti bekleniyor</span>
</div>

<div class="song-area">
<div class="label">Su Anda Calan</div>
<div class="song-name" id="songName">---</div>
<div class="live-badge" id="liveBadge">CANLI</div>
</div>

<div id="controlArea">
<div id="waitingArea" class="waiting-area">
<div class="icon">&#x1F4E1;</div>
<div>Yayin bekleniyor</div>
</div>

<button class="connect-btn" id="connectBtn" style="display:none">BAGLAN</button>

<div class="volume-wrap" id="volumeWrap">
<span class="icon">&#x1F509;</span>
<input type="range" id="volumeSlider" min="0" max="100" value="80">
<span class="icon" id="volLabel">80</span>
</div>
</div>

<div id="interstitialHelp" style="display:none;margin-top:15px;font-size:13px;color:#888">
<span style="color:#f59">Ngrok izni gerekebilir.</span>
<span id="interstitialLink" onclick="openNgrok(event)" style="color:#6cf;text-decoration:underline;cursor:pointer">[Baglantiyi ac]</span>
</div>

<div class="footer">sam.py &middot; Okul Radyosu</div>
</div>

<script>
var dot = document.getElementById('dot');
var statusText = document.getElementById('statusText');
var songName = document.getElementById('songName');
var liveBadge = document.getElementById('liveBadge');
var connectBtn = document.getElementById('connectBtn');
var volumeWrap = document.getElementById('volumeWrap');
var volumeSlider = document.getElementById('volumeSlider');
var volLabel = document.getElementById('volLabel');
var waitingArea = document.getElementById('waitingArea');
var interstitialHelp = document.getElementById('interstitialHelp');
var interstitialLink = document.getElementById('interstitialLink');

var player = document.createElement('audio');
player.preload = 'auto';
player.style.display = 'none';
document.body.appendChild(player);

var currentSong = null;
var connected = false;
var lastStatus = null;
var switching = false;
var BASE_URL = null;

function jsonp(url) {
    return new Promise(function(resolve, reject) {
        var id = '_cb' + (Math.random()*99999|0);
        var s = document.createElement('script');
        var t = setTimeout(function(){cleanup();reject(new Error('timeout'))},8000);
        window[id]=function(d){cleanup();resolve(d)};
        function cleanup(){clearTimeout(t);delete window[id];if(s.parentNode)s.parentNode.removeChild(s)}
        s.src = url + (url.indexOf('?')>-1?'&':'?') + 'callback=' + id;
        s.onerror = function(){cleanup();reject(new Error('net'))};
        document.body.appendChild(s);
    });
}

function startApp(url) {
    BASE_URL = url;
    statusText.textContent = 'Baglanti bekleniyor';
    interstitialHelp.style.display = 'none';
    fetchStatus();
    setInterval(fetchStatus, 3000);
}

function setOnline(on) {
    if (!connected) { dot.className = 'dot off'; statusText.textContent = 'Bagli degil'; return; }
    dot.className = 'dot' + (on ? ' on' : ' off');
    statusText.textContent = on ? 'Yayinda' : 'Baglanti kesik';
}

function setSongUI(name) {
    songName.textContent = name || '---';
    liveBadge.className = 'live-badge' + (name && connected ? ' on' : '');
}

function seekLive() {
    if (!lastStatus || !lastStatus.is_playing || !lastStatus.start_time) return;
    var elapsed = lastStatus.current_position + (Date.now()/1000 - lastStatus.server_time);
    if (elapsed < 0) elapsed = 0;
    player.currentTime = elapsed;
}

function startAudio(src) {
    player.src = src;
    player.load();
    player.addEventListener('canplay', function onReady() {
        player.removeEventListener('canplay', onReady);
        seekLive();
        player.play()["catch"](function(){});
    });
}

function connect() {
    if (!lastStatus || !lastStatus.is_playing) {
        waitingArea.querySelector('div:last-child').textContent = 'Henuz sarki secilmedi!';
        return;
    }
    connected = true;
    connectBtn.style.display = 'none';
    volumeWrap.className = 'volume-wrap on';
    waitingArea.style.display = 'none';
    currentSong = lastStatus.song_name;
    player.volume = volumeSlider.value / 100;
    startAudio(BASE_URL + '/stream?v=' + Date.now());
    setOnline(true);
    setSongUI(lastStatus.song_name);
}

function openNgrok(event) {
    if (event) event.preventDefault();
    window.open(BASE_URL, '_blank');
}

connectBtn.addEventListener('click', connect);

volumeSlider.addEventListener('input', function() {
    var v = volumeSlider.value;
    player.volume = v / 100;
    volLabel.textContent = v;
});

function switchSong(name) {
    if (switching) return;
    switching = true;
    currentSong = name;
    player.pause();
    player.removeAttribute('src');
    player.load();
    setTimeout(function() {
        startAudio(BASE_URL + '/stream?v=' + Date.now());
        switching = false;
    }, 150);
}

function handleStatus(d) {
    if (!d || d.error) {
        if (connected) setOnline(false);
        return;
    }
    lastStatus = d;
    interstitialHelp.style.display = 'none';
    if (connected) {
        if (d.is_playing && d.song_name) {
            setOnline(true);
            setSongUI(d.song_name);
            if (currentSong !== d.song_name) {
                switchSong(d.song_name);
            }
        } else {
            setOnline(false);
            setSongUI(null);
            currentSong = null;
            player.pause();
            player.removeAttribute('src');
            player.load();
        }
    } else {
        if (d.is_playing && d.song_name) {
            songName.textContent = d.song_name;
            waitingArea.style.display = 'none';
            connectBtn.style.display = 'inline-block';
            dot.className = 'dot on';
            statusText.textContent = 'Yayin hazir';
        } else {
            waitingArea.style.display = 'block';
            connectBtn.style.display = 'none';
            songName.textContent = '---';
            dot.className = 'dot off';
            statusText.textContent = 'Yayin bekleniyor';
        }
    }
}

function fetchStatus() {
    jsonp(BASE_URL + '/status').then(handleStatus)["catch"](function(){
        if (connected) { setOnline(false); return; }
        dot.className = 'dot off';
        statusText.textContent = 'Sunucuya ulasilamiyor';
        songName.textContent = 'sam.py kapali veya URL hatali';
        interstitialHelp.style.display = 'block';
    });
}

var params = new URLSearchParams(window.location.search);
if (params.get('server')) {
    startApp(params.get('server'));
} else if (window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
    startApp('http://localhost:5000');
} else {
    statusText.textContent = 'Radyo araniyor...';
    fetch('https://api.github.com/repos/mehmetsam2736/SAMRADYO/contents/url.txt', {
        headers: {'Accept': 'application/vnd.github.v3+json'}
    }).then(function(r) {
        if (!r.ok) throw new Error('no file');
        return r.json();
    }).then(function(d) {
        var url = atob(d.content.replace(/\s/g, ''));
        if (url) startApp(url.trim());
        else throw new Error('empty');
    })["catch"](function() {
        dot.className = 'dot off';
        statusText.textContent = 'Sunucu bulunamadi';
        songName.textContent = 'sam.py calistirildigindan emin olun';
    });
}
</script>
</body>
</html>
